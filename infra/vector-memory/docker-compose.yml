services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: genesisprediction-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://genesisprediction-qdrant:6333
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  open-webui:
    external: true