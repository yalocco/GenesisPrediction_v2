version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: genesisprediction-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO

volumes:
  qdrant_storage:
    name: genesisprediction_qdrant_storage
