<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sentiment - GenesisPrediction v2</title>

  <!-- SENTIMENT_A_BUILD: 2026-03-03T00:00:00Z (join daily_news_latest -> urlToImage + safer KPIs) -->

  <!-- NOTE:
    This page is designed to be robust against schema drift:
    - sentiment_latest.json may have {items:[...]} (preferred) or {articles:[...]}.
    - daily_news_latest.json has {articles:[...]} (NewsAPI-like), used only for thumbnail join by url.
  -->

  <link rel="stylesheet" href="/static/app.css?v=sentiment_a_20260303" />

  <style>
    /* Minimal local polish; colors come from existing app.css rules */
    .wrap{max-width:1180px;margin:0 auto;padding:18px 18px 42px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}
    .brand{display:flex;align-items:center;gap:12px}
    .dot{width:12px;height:12px;border-radius:999px;background:rgba(105,169,255,.95);box-shadow:0 0 0 4px rgba(105,169,255,.16)}
    .brand h1{margin:0;font-size:22px;letter-spacing:.2px}
    .brand .sub{opacity:.82;font-size:13px;margin-top:2px}
    nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    nav a{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);text-decoration:none;color:inherit;opacity:.92}
    nav a:hover{border-color:rgba(105,169,255,.5);opacity:1}
    nav a.active{border-color:rgba(105,169,255,.85);box-shadow:0 0 0 4px rgba(105,169,255,.12);opacity:1}

    .panel{border:1px solid rgba(255,255,255,.10);border-radius:18px;background:rgba(8,12,20,.55);box-shadow:0 18px 60px rgba(0,0,0,.28);padding:16px}
    .headerline{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .title{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .title h2{margin:0;font-size:20px}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-size:12px;opacity:.92}
    .btn{cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:inherit}
    .btn:hover{border-color:rgba(105,169,255,.55)}
    .grid{display:grid;grid-template-columns: 1.2fr .8fr;gap:14px}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr} }

    .kpis{display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:12px}
    @media (max-width: 520px){ .kpis{grid-template-columns:1fr} }
    .kpi{border:1px solid rgba(255,255,255,.10);border-radius:14px;background:rgba(255,255,255,.03);padding:12px}
    .kpi .num{font-size:22px;font-weight:700;line-height:1.1}
    .kpi .lbl{font-size:12px;opacity:.82;margin-top:4px}

    .barrow{margin-top:12px}
    .bar{height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;border:1px solid rgba(255,255,255,.08)}
    .bar > div{height:100%}
    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;opacity:.9;font-size:12px}
    .dotl{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:6px;vertical-align:-1px;background:currentColor;opacity:.9}
    .legend .item{display:inline-flex;align-items:center;gap:6px}

    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    input[type="search"]{min-width:260px;max-width:420px;width:100%;padding:9px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.22);color:inherit;outline:none}
    select{padding:9px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.22);color:inherit;outline:none}

    .list{margin-top:14px;display:flex;flex-direction:column;gap:12px}
    .card{display:grid;grid-template-columns: 132px 1fr;gap:12px;align-items:stretch;border:1px solid rgba(255,255,255,.10);border-radius:18px;background:rgba(255,255,255,.03);padding:12px}
    @media (max-width: 720px){ .card{grid-template-columns:96px 1fr} }
    .thumb{border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .thumb .noimg{font-size:11px;opacity:.65;padding:6px;text-align:center}
    .meta{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .meta .right{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    .tag{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:6px 10px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.18);font-size:12px;opacity:.92}
    .tag.small{padding:4px 8px;font-size:11px}
    .h3{margin:2px 0 6px;font-size:16px;line-height:1.25}
    .desc{margin:0;opacity:.85;font-size:13px;line-height:1.45}
    a{color:inherit}
    .footerline{opacity:.7;font-size:11px;margin-top:12px}
    details{margin-top:10px}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="dot" aria-hidden="true"></div>
        <div>
          <h1>GenesisPrediction v2</h1>
          <div class="sub">Sentiment / Trend</div>
        </div>
      </div>
      <nav aria-label="Primary">
        <a href="/static/index.html">Home</a>
        <a href="/static/overlay.html">Overlay</a>
        <a class="active" href="/static/sentiment.html">Sentiment</a>
        <a href="/static/digest.html">Digest</a>
      </nav>
    </div>

    <div class="panel">
      <div class="headerline">
        <div class="title">
          <h2>Sentiment</h2>
          <span class="pill" id="asOf">as_of: --</span>
          <span class="pill" id="src">source: /data/world_politics/analysis/sentiment_latest.json</span>
          <span class="pill" id="itemsPill">items: --</span>
        </div>
        <div class="controls">
          <button class="btn" id="btnOpenJson" type="button">Open JSON</button>
        </div>
      </div>

      <div class="grid">
        <div>
          <div class="legend" id="legend">
            <span class="item" style="color:rgba(105,169,255,.95)"><span class="dotl"></span>Positive</span>
            <span class="item" style="color:rgba(255,107,107,.92)"><span class="dotl"></span>Negative</span>
            <span class="item" style="color:rgba(200,200,200,.90)"><span class="dotl"></span>Neutral</span>
            <span class="item" style="color:rgba(255,199,89,.92)"><span class="dotl"></span>Mixed</span>
            <span class="item" style="color:rgba(150,150,150,.70)"><span class="dotl"></span>Unknown</span>
          </div>

          <div class="barrow">
            <div class="bar" aria-label="Sentiment distribution">
              <div id="bPos" style="width:0%; background:rgba(105,169,255,.75)"></div>
              <div id="bNeg" style="width:0%; background:rgba(255,107,107,.70)"></div>
              <div id="bNeu" style="width:0%; background:rgba(200,200,200,.55)"></div>
              <div id="bMix" style="width:0%; background:rgba(255,199,89,.65)"></div>
              <div id="bUnk" style="width:0%; background:rgba(150,150,150,.45)"></div>
            </div>
          </div>

          <div class="footerline" id="metaLine">loading...</div>

          <details>
            <summary>raw (debug)</summary>
            <pre id="raw">{}</pre>
          </details>
        </div>

        <div>
          <div class="kpis">
            <div class="kpi"><div class="num" id="kTotal">--</div><div class="lbl">Total items</div></div>
            <div class="kpi"><div class="num" id="kPos">--</div><div class="lbl">Positive</div></div>
            <div class="kpi"><div class="num" id="kNeg">--</div><div class="lbl">Negative</div></div>
            <div class="kpi"><div class="num" id="kNeu">--</div><div class="lbl">Neutral</div></div>
            <div class="kpi"><div class="num" id="kMix">--</div><div class="lbl">Mixed</div></div>
            <div class="kpi"><div class="num" id="kUnk">--</div><div class="lbl">Unknown</div></div>
          </div>

          <div class="controls" style="margin-top:12px;justify-content:flex-start">
            <input id="q" type="search" placeholder="Search title/source..." />
            <select id="filter">
              <option value="all">All</option>
              <option value="positive">Positive</option>
              <option value="negative">Negative</option>
              <option value="neutral">Neutral</option>
              <option value="mixed">Mixed</option>
              <option value="unknown">Unknown</option>
            </select>
            <select id="sort">
              <option value="score">Top (score)</option>
              <option value="newest">Newest (if available)</option>
              <option value="az">Title A→Z</option>
            </select>
          </div>
        </div>
      </div>

      <div class="list" id="list"></div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  function $(id){ return document.getElementById(id); }
  function setText(el, v){ if(!el) return; el.textContent = (v === undefined || v === null) ? "" : String(v); }
  function safeStr(v){ return (v === undefined || v === null) ? "" : String(v); }

  function pickAsOf(root){
    var v = root && (root.as_of || root.date || root.generated_at || root.fetched_at);
    return v ? safeStr(v).slice(0,10) : "";
  }

  function pickItems(root){
    if(!root) return [];
    if(Array.isArray(root.items)) return root.items;
    if(Array.isArray(root.articles)) return root.articles;
    return [];
  }

  function normalizeItem(x){
    // unify schema
    var sourceName = "";
    if(x && x.source){
      if(typeof x.source === "string") sourceName = x.source;
      else if(x.source.name) sourceName = x.source.name;
    }
    return {
      url: safeStr(x.url),
      title: safeStr(x.title),
      description: safeStr(x.description || x.summary),
      source_name: sourceName,
      // signals
      risk: num(x.risk),
      positive: num(x.positive),
      uncertainty: num(x.uncertainty),
      net: num(x.net),
      method: safeStr(x.method),
      // images (maybe joined later)
      image: safeStr(x.urlToImage || x.image_url || x.image || x.thumbnail || "")
    };
  }

  function num(v){
    var n = Number(v);
    return Number.isFinite(n) ? n : NaN;
  }

  function classify(it){
    // Prefer explicit net if present, otherwise positive/risk heuristic
    var net = it.net;
    var pos = it.positive;
    var risk = it.risk;
    var unc = it.uncertainty;

    var hasAny = Number.isFinite(net) || Number.isFinite(pos) || Number.isFinite(risk) || Number.isFinite(unc);
    if(!hasAny) return "unknown";

    // Mixed if both strong positive and strong risk
    if(Number.isFinite(pos) && Number.isFinite(risk) && pos >= 0.6 && risk >= 0.6) return "mixed";

    if(Number.isFinite(net)){
      if(net > 0.15) return "positive";
      if(net < -0.15) return "negative";
      return "neutral";
    }

    // fallback: positive vs risk
    if(Number.isFinite(pos) && pos >= 0.55) return "positive";
    if(Number.isFinite(risk) && risk >= 0.55) return "negative";
    return "neutral";
  }

  function score(it){
    // big impact items first
    var pos = Number.isFinite(it.positive) ? it.positive : 0;
    var risk = Number.isFinite(it.risk) ? it.risk : 0;
    var unc = Number.isFinite(it.uncertainty) ? it.uncertainty : 0;
    var net = Number.isFinite(it.net) ? it.net : 0;
    return (Math.abs(net) * 2.0) + (risk * 1.1) + (pos * 1.0) + (unc * 0.7);
  }

  function pct(n, total){
    if(!total) return 0;
    return Math.max(0, Math.min(100, (n / total) * 100));
  }

  function renderBar(counts){
    var total = counts.total || 0;
    $("bPos").style.width = pct(counts.positive, total) + "%";
    $("bNeg").style.width = pct(counts.negative, total) + "%";
    $("bNeu").style.width = pct(counts.neutral, total) + "%";
    $("bMix").style.width = pct(counts.mixed, total) + "%";
    $("bUnk").style.width = pct(counts.unknown, total) + "%";
  }

  function buildCounts(items){
    var c = {total: 0, positive: 0, negative: 0, neutral: 0, mixed: 0, unknown: 0};
    (items || []).forEach(function(it){
      c.total += 1;
      var k = classify(it);
      if(c[k] !== undefined) c[k] += 1;
      else c.unknown += 1;
    });
    return c;
  }

  function el(tag, cls, txt){
    var e = document.createElement(tag);
    if(cls) e.className = cls;
    if(txt !== undefined) e.textContent = txt;
    return e;
  }

  function renderList(items){
    var q = safeStr($("q").value).toLowerCase().trim();
    var filter = $("filter").value;
    var sort = $("sort").value;

    var arr = (items || []).slice();

    if(q){
      arr = arr.filter(function(it){
        return (it.title && it.title.toLowerCase().indexOf(q) >= 0) ||
               (it.source_name && it.source_name.toLowerCase().indexOf(q) >= 0);
      });
    }

    if(filter && filter !== "all"){
      arr = arr.filter(function(it){ return classify(it) === filter; });
    }

    if(sort === "az"){
      arr.sort(function(a,b){ return (a.title || "").localeCompare((b.title || "")); });
    } else if(sort === "newest"){
      // if someday items include publishedAt
      arr.sort(function(a,b){
        var da = Date.parse(a.publishedAt || "") || 0;
        var db = Date.parse(b.publishedAt || "") || 0;
        return db - da;
      });
    } else {
      arr.sort(function(a,b){ return score(b) - score(a); });
    }

    var root = $("list");
    root.innerHTML = "";
    arr.forEach(function(it){
      var card = el("div", "card");

      var th = el("div", "thumb");
      if(it.image){
        var img = document.createElement("img");
        img.loading = "lazy";
        img.alt = "";
        img.src = it.image;
        img.onerror = function(){
          th.innerHTML = "";
          th.appendChild(el("div", "noimg", "no image"));
        };
        th.appendChild(img);
      } else {
        th.appendChild(el("div", "noimg", "no image"));
      }

      var body = el("div");

      var meta = el("div", "meta");
      var left = el("div", "left");
      var right = el("div", "right");

      var cls = classify(it);
      right.appendChild(el("span", "tag small", cls));
      if(it.source_name) right.appendChild(el("span", "tag small", it.source_name));
      if(it.method) right.appendChild(el("span", "tag small", it.method));

      meta.appendChild(left);
      meta.appendChild(right);

      var h3 = el("div", "h3");
      var a = document.createElement("a");
      a.href = it.url || "#";
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = it.title || "(no title)";
      h3.appendChild(a);

      var d = el("p", "desc", it.description || "");

      body.appendChild(meta);
      body.appendChild(h3);
      body.appendChild(d);

      card.appendChild(th);
      card.appendChild(body);
      root.appendChild(card);
    });

    setText($("itemsPill"), "items: " + arr.length);
  }

  function mapNewsImages(newsRoot){
    // daily_news_latest.json is NewsAPI-like: { articles: [ {url, urlToImage, ...} ] }
    var map = {};
    if(!newsRoot || !Array.isArray(newsRoot.articles)) return map;
    newsRoot.articles.forEach(function(a){
      var u = safeStr(a.url);
      var img = safeStr(a.urlToImage || a.image || a.thumbnail || "");
      if(u && img && !map[u]) map[u] = img;
    });
    return map;
  }

  function mergeImages(items, imgMap){
    if(!imgMap) return items;
    return (items || []).map(function(it){
      if(!it.image && it.url && imgMap[it.url]) it.image = imgMap[it.url];
      return it;
    });
  }

  function openJson(){
    window.open("/data/world_politics/analysis/sentiment_latest.json", "_blank", "noopener");
  }

  $("btnOpenJson").addEventListener("click", openJson);
  $("q").addEventListener("input", function(){ renderList(window.__items || []); });
  $("filter").addEventListener("change", function(){ renderList(window.__items || []); });
  $("sort").addEventListener("change", function(){ renderList(window.__items || []); });

  async function load(){
    try{
      var sentResp = await fetch("/data/world_politics/analysis/sentiment_latest.json?cb=" + Date.now(), {cache:"no-store"});
      var sentRoot = await sentResp.json();

      // optional join
      var newsRoot = null;
      try{
        var newsResp = await fetch("/data/world_politics/analysis/daily_news_latest.json?cb=" + Date.now(), {cache:"no-store"});
        newsRoot = await newsResp.json();
      }catch(e){ newsRoot = null; }

      var asOf = pickAsOf(sentRoot);
      setText($("asOf"), "as_of: " + (asOf || "--"));

      var rawItems = pickItems(sentRoot);
      var items = rawItems.map(normalizeItem);

      // Join thumbnails if possible
      var imgMap = mapNewsImages(newsRoot);
      items = mergeImages(items, imgMap);

      window.__items = items;

      var counts = buildCounts(items);
      setText($("kTotal"), counts.total);
      setText($("kPos"), counts.positive);
      setText($("kNeg"), counts.negative);
      setText($("kNeu"), counts.neutral);
      setText($("kMix"), counts.mixed);
      setText($("kUnk"), counts.unknown);

      renderBar(counts);

      var meta = [];
      if(sentRoot && sentRoot.fetched_at) meta.push("fetched_at=" + safeStr(sentRoot.fetched_at));
      if(sentRoot && sentRoot.generated_at) meta.push("generated_at=" + safeStr(sentRoot.generated_at));
      if(sentRoot && sentRoot.n_events) meta.push("n_events=" + safeStr(sentRoot.n_events));
      if(newsRoot && newsRoot.fetched_at) meta.push("news_fetched_at=" + safeStr(newsRoot.fetched_at));
      setText($("metaLine"), meta.length ? meta.join(" / ") : "OK");

      // raw debug (keep small)
      setText($("raw"), JSON.stringify({as_of: asOf, items: rawItems.slice(0,2)}, null, 2));

      renderList(items);
    }catch(err){
      console.error(err);
      setText($("metaLine"), "ERROR: " + (err && err.message ? err.message : String(err)));
    }
  }

  load();
})();
</script>
</body>
</html>
