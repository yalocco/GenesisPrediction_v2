<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sentiment - GenesisPrediction v2</title>

  <meta name="color-scheme" content="dark light" />
  <meta name="robots" content="noindex,nofollow" />

  <style>
    :root{
      --bg0:#070a12;
      --bg1:#0b1020;
      --edge:rgba(255,255,255,.08);
      --text:#e5e7eb;
      --muted:#9aa4b2;
      --accent:#69a9ff;
      --good:#2dd4bf;
      --bad:#fb7185;
      --neutral:#a1a1aa;
      --mix:#fbbf24;
      --unk:#64748b;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius:18px;
      --radius2:22px;
    }
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 600px at 18% 12%, rgba(105,169,255,.14), transparent 55%),
        radial-gradient(900px 540px at 78% 18%, rgba(253,186,116,.10), transparent 55%),
        radial-gradient(900px 520px at 56% 78%, rgba(45,212,191,.08), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .wrap{max-width:1240px;margin:18px auto 64px;padding:0 16px}

    /* header */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      padding:18px;border:1px solid var(--edge);border-radius:var(--radius2);
      background:
        radial-gradient(900px 400px at 10% 30%, rgba(105,169,255,.10), transparent 60%),
        radial-gradient(900px 400px at 90% 30%, rgba(253,186,116,.08), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:240px}
    .dot{width:14px;height:14px;border-radius:999px;background:rgba(105,169,255,.85);box-shadow:0 0 0 6px rgba(105,169,255,.12)}
    .brand h1{margin:0;font-size:22px;font-weight:700;line-height:1.1}
    .brand .sub{display:block;margin-top:2px;font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.3px}

    nav{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
    nav a{
      text-decoration:none;font-weight:700;color:rgba(229,231,235,.92);
      padding:10px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      transition: transform .06s ease, border-color .15s ease, background .15s ease;
      user-select:none;
    }
    nav a:hover{border-color:rgba(105,169,255,.5);background:rgba(105,169,255,.07)}
    nav a.active{border-color:rgba(105,169,255,.75);background:rgba(105,169,255,.10);box-shadow:0 0 0 2px rgba(105,169,255,.18) inset}

    /* card */
    .card{
      margin-top:16px;border:1px solid var(--edge);border-radius:var(--radius2);
      background:
        radial-gradient(900px 420px at 15% 15%, rgba(105,169,255,.08), transparent 58%),
        radial-gradient(900px 420px at 85% 18%, rgba(253,186,116,.07), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }
    .card-inner{padding:18px}

    .hrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between}
    .title{font-size:26px;font-weight:800;margin:0}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 12px;border:1px solid rgba(255,255,255,.10);
      border-radius:999px;background:rgba(0,0,0,.18);
      font-size:12px;font-weight:800;letter-spacing:.3px;white-space:nowrap;
    }
    .divider{height:1px;background:rgba(255,255,255,.07);margin:14px 0 16px}

    .grid{display:grid;grid-template-columns:1.35fr .85fr;gap:16px;align-items:start}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.brand{min-width:auto}}

    .panel{border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);background:rgba(0,0,0,.14);overflow:hidden}
    .ph{padding:12px 12px 0;display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center}

    .legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;font-weight:800;font-size:13px;color:rgba(229,231,235,.92)}
    .dot2{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:6px;box-shadow:0 0 0 4px rgba(255,255,255,.06)}
    .c-good{background:rgba(45,212,191,.95);box-shadow:0 0 0 4px rgba(45,212,191,.10)}
    .c-bad{background:rgba(251,113,133,.95);box-shadow:0 0 0 4px rgba(251,113,133,.10)}
    .c-neutral{background:rgba(161,161,170,.95);box-shadow:0 0 0 4px rgba(161,161,170,.10)}
    .c-mix{background:rgba(251,191,36,.95);box-shadow:0 0 0 4px rgba(251,191,36,.10)}
    .c-unk{background:rgba(100,116,139,.95);box-shadow:0 0 0 4px rgba(100,116,139,.10)}

    .barwrap{padding:12px}
    .bar{height:8px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);overflow:hidden}
    .bar > div{height:100%;width:0%;background:linear-gradient(90deg, rgba(45,212,191,.9), rgba(105,169,255,.9))}

    /* graph */
    .graph{
      margin-top:10px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      background:rgba(0,0,0,.18);
      overflow:hidden;
      position:relative;
    }
    .graph canvas{display:block;width:100%;height:260px}
    .graph .glabel{
      position:absolute;right:10px;top:10px;
      font-size:12px;font-weight:900;color:rgba(229,231,235,.78);
      padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
    }

    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .kpi{border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(0,0,0,.14);padding:12px;min-height:64px}
    .kpi .num{font-size:28px;font-weight:900}
    .kpi .lbl{font-size:12px;color:rgba(229,231,235,.85);font-weight:800;margin-top:4px}

    .ctrls{margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    input[type="search"], select{
      appearance:none;-webkit-appearance:none;
      background:rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(229,231,235,.92);
      border-radius:999px;
      padding:10px 12px;
      font-weight:800;
      outline:none;
    }
    input[type="search"]{min-width:260px}
    select{padding-right:36px}

    .list{margin-top:14px;display:flex;flex-direction:column;gap:12px}
    .item{
      display:grid;grid-template-columns:170px 1fr;gap:14px;
      padding:12px;border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      background:rgba(0,0,0,.14);
    }
    @media (max-width:820px){.item{grid-template-columns:1fr}}

    .thumb{
      width:170px;height:96px;border-radius:14px;border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);overflow:hidden;display:flex;align-items:center;justify-content:center;
      color:rgba(229,231,235,.75);font-weight:900;font-size:12px;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    @media (max-width:820px){.thumb{width:100%;height:180px}}

    .it-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .it-title{margin:0;font-size:18px;font-weight:900;line-height:1.25}
    .it-desc{margin:8px 0 0;color:rgba(229,231,235,.82);font-size:13px;line-height:1.45;font-weight:650}

    .tags{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    .tag{
      padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);font-size:12px;font-weight:900;letter-spacing:.25px;
      color:rgba(229,231,235,.92);white-space:nowrap;
    }
    .t-good{border-color:rgba(45,212,191,.35);background:rgba(45,212,191,.08)}
    .t-bad{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.08)}
    .t-neutral{border-color:rgba(161,161,170,.32);background:rgba(161,161,170,.08)}
    .t-mix{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.08)}
    .t-unk{border-color:rgba(100,116,139,.35);background:rgba(100,116,139,.10)}

    .small{margin-top:8px;color:rgba(148,163,184,.85);font-size:12px;font-weight:700}

    button.btn{
      appearance:none;border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:rgba(229,231,235,.92);
      padding:10px 14px;border-radius:999px;
      font-weight:900;letter-spacing:.2px;cursor:pointer;
    }
    button.btn:hover{border-color:rgba(105,169,255,.55);background:rgba(105,169,255,.08)}
  </style>
</head>

<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <div>
          <h1>GenesisPrediction v2</h1>
          <span class="sub">Sentiment / Trend</span>
        </div>
      </div>

      <nav>
        <a href="/static/index.html">Home</a>
        <a href="/static/overlay.html">Overlay</a>
        <a class="active" href="/static/sentiment.html">Sentiment</a>
        <a href="/static/digest.html">Digest</a>
      </nav>
    </header>

    <section class="card">
      <div class="card-inner">
        <div class="hrow">
          <h2 class="title">Sentiment</h2>
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end">
            <span class="pill" id="as_of">as_of: --</span>
            <span class="pill" id="source">source: --</span>
            <span class="pill" id="items">items: --</span>
            <button class="btn" id="open_json">Open JSON</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="grid">
          <div class="panel">
            <div class="ph">
              <div class="legend" aria-label="legend">
                <span><span class="dot2 c-good"></span> Positive</span>
                <span><span class="dot2 c-bad"></span> Negative</span>
                <span><span class="dot2 c-neutral"></span> Neutral</span>
                <span><span class="dot2 c-mix"></span> Mixed</span>
                <span><span class="dot2 c-unk"></span> Unknown</span>
              </div>
            </div>

            <div class="barwrap">
              <div class="bar" title="Sentiment balance (visual)">
                <div id="balance_bar"></div>
              </div>

              <!-- SAFE graph (canvas) -->
              <div class="graph" aria-label="trend graph">
                <div class="glabel" id="glabel">trend: safe</div>
                <canvas id="trend_canvas" width="1200" height="520"></canvas>
              </div>

              <div class="small" id="meta_line">generated_at=-- / news_fetched_at=--</div>
            </div>
          </div>

          <div>
            <div class="kpis">
              <div class="kpi"><div class="num" id="k_total">--</div><div class="lbl">Total items</div></div>
              <div class="kpi"><div class="num" id="k_pos">--</div><div class="lbl">Positive</div></div>
              <div class="kpi"><div class="num" id="k_neg">--</div><div class="lbl">Negative</div></div>
              <div class="kpi"><div class="num" id="k_neu">--</div><div class="lbl">Neutral</div></div>
              <div class="kpi"><div class="num" id="k_mix">--</div><div class="lbl">Mixed</div></div>
              <div class="kpi"><div class="num" id="k_unk">--</div><div class="lbl">Unknown</div></div>
            </div>

            <div class="ctrls">
              <input id="q" type="search" placeholder="Search title/source..." />
              <select id="filter_label">
                <option value="all">All</option>
                <option value="positive">Positive</option>
                <option value="negative">Negative</option>
                <option value="neutral">Neutral</option>
                <option value="mixed">Mixed</option>
                <option value="unknown">Unknown</option>
              </select>
              <select id="sort_mode">
                <option value="score">Top (score)</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
                <option value="az">A→Z</option>
              </select>
            </div>
          </div>
        </div>

        <div class="list" id="list"></div>
      </div>
    </section>
  </div>

  <script>
    const JSON_PATH = "/data/world_politics/analysis/sentiment_latest.json";
    const DAILY_NEWS_PATH = "/data/world_politics/analysis/daily_news_latest.json";

    const $ = (id) => document.getElementById(id);
    const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));

    function normLabel(x){
      const v=(x??"").toString().trim().toLowerCase();
      if(["pos","positive","good"].includes(v)) return "positive";
      if(["neg","negative","bad"].includes(v)) return "negative";
      if(["neu","neutral"].includes(v)) return "neutral";
      if(["mix","mixed"].includes(v)) return "mixed";
      if(["unk","unknown","na","n/a"].includes(v)) return "unknown";
      return v||"unknown";
    }
    function tagClass(label){
      if(label==="positive") return "t-good";
      if(label==="negative") return "t-bad";
      if(label==="neutral") return "t-neutral";
      if(label==="mixed") return "t-mix";
      return "t-unk";
    }
    function pickSourceName(src){
      if(!src) return "";
      if(typeof src==="string") return src;
      if(typeof src==="object") return src.name || src.id || "";
      return "";
    }
    function scoreOf(it){
      const pos=Number(it.positive ?? 0);
      const neg=Number(it.risk ?? it.negative ?? 0);
      const unc=Number(it.uncertainty ?? 0);
      const net=Number(it.net ?? (pos-neg));
      return Math.abs(net)+Math.abs(pos)+Math.abs(neg)+(unc*0.35);
    }

    async function buildImageMap(){
      try{
        const r=await fetch(DAILY_NEWS_PATH,{cache:"no-store"});
        if(!r.ok) return new Map();
        const j=await r.json();
        const arts=j.articles || j.items || [];
        const m=new Map();
        for(const a of arts){
          const u=a.url;
          const img=a.urlToImage || a.image || a.image_url || a.thumbnail || "";
          if(u && img) m.set(u,img);
        }
        return m;
      }catch(e){ return new Map(); }
    }

    function renderKPI(total,pos,neg,neu,mix,unk){
      $("k_total").textContent=total;
      $("k_pos").textContent=pos;
      $("k_neg").textContent=neg;
      $("k_neu").textContent=neu;
      $("k_mix").textContent=mix;
      $("k_unk").textContent=unk;
      $("items").textContent=`items: ${total}`;
    }
    function renderBalance(pos,neg){
      const denom=Math.max(1,pos+neg);
      const pct=clamp(Math.round((pos/denom)*100),0,100);
      $("balance_bar").style.width=pct+"%";
    }

    function makeThumb(url){
      const box=document.createElement("div");
      box.className="thumb";
      if(url){
        const img=document.createElement("img");
        img.loading="lazy";
        img.referrerPolicy="no-referrer";
        img.src=url;
        img.onerror=()=>{ box.textContent="no image"; };
        box.appendChild(img);
      }else{
        box.textContent="no image";
      }
      return box;
    }

    function makeItem(it,imgUrl){
      const label=normLabel(it.label || it.sentiment || it.class || it.bucket);
      const srcName=pickSourceName(it.source);

      const row=document.createElement("div");
      row.className="item";
      row.appendChild(makeThumb(imgUrl));

      const right=document.createElement("div");

      const head=document.createElement("div");
      head.className="it-head";

      const t=document.createElement("h3");
      t.className="it-title";
      t.textContent=(it.title || "(no title)");

      const tags=document.createElement("div");
      tags.className="tags";

      const tg1=document.createElement("span");
      tg1.className="tag "+tagClass(label);
      tg1.textContent=label;

      const tg2=document.createElement("span");
      tg2.className="tag";
      tg2.textContent=srcName || "source";

      const tg3=document.createElement("span");
      tg3.className="tag";
      tg3.textContent=(it.method || "method").toString();

      tags.appendChild(tg1); tags.appendChild(tg2); tags.appendChild(tg3);

      head.appendChild(t);
      head.appendChild(tags);

      const desc=document.createElement("p");
      desc.className="it-desc";
      desc.textContent=(it.description || it.summary || "");

      right.appendChild(head);
      right.appendChild(desc);

      if(it.url){
        const small=document.createElement("div");
        small.className="small";
        const link=document.createElement("a");
        link.href=it.url;
        link.target="_blank";
        link.rel="noopener";
        link.textContent="Open article";
        link.style.textDecoration="none";
        link.style.borderBottom="1px dotted rgba(105,169,255,.55)";
        link.style.color="rgba(229,231,235,.92)";
        small.appendChild(link);
        right.appendChild(small);
      }

      row.appendChild(right);
      return row;
    }

    function applyQueryAndRender(items,imageMap){
      const q=($("q").value||"").trim().toLowerCase();
      const fl=$("filter_label").value;
      const sm=$("sort_mode").value;

      let arr=items.slice();

      if(fl!=="all"){
        arr=arr.filter(x=>normLabel(x.label||x.sentiment||x.class||x.bucket)===fl);
      }
      if(q){
        arr=arr.filter(x=>{
          const s=(x.title||"")+" "+pickSourceName(x.source)+" "+(x.description||"");
          return s.toLowerCase().includes(q);
        });
      }
      if(sm==="score") arr.sort((a,b)=>scoreOf(b)-scoreOf(a));
      else if(sm==="az") arr.sort((a,b)=>(a.title||"").localeCompare(b.title||""));
      else if(sm==="newest") arr.sort((a,b)=>(b.publishedAt||"").localeCompare(a.publishedAt||""));
      else if(sm==="oldest") arr.sort((a,b)=>(a.publishedAt||"").localeCompare(b.publishedAt||""));

      const box=$("list");
      box.innerHTML="";
      for(const it of arr){
        const u=it.url;
        const img=it.urlToImage || it.image || it.image_url || it.thumbnail || (u ? (imageMap.get(u)||"") : "");
        box.appendChild(makeItem(it,img));
      }
    }

    // SAFE graph: draw something even if no trend data exists
    function drawSafeTrend(canvas, counts){
      const ctx=canvas.getContext("2d");
      const w=canvas.width, h=canvas.height;

      // background
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle="rgba(0,0,0,0)";
      ctx.fillRect(0,0,w,h);

      // grid
      ctx.strokeStyle="rgba(255,255,255,.08)";
      ctx.lineWidth=1;
      const pad=44;
      for(let i=0;i<=5;i++){
        const y=pad + (h-pad*2)*(i/5);
        ctx.beginPath();
        ctx.moveTo(pad,y);
        ctx.lineTo(w-pad,y);
        ctx.stroke();
      }
      for(let i=0;i<=8;i++){
        const x=pad + (w-pad*2)*(i/8);
        ctx.beginPath();
        ctx.moveTo(x,pad);
        ctx.lineTo(x,h-pad);
        ctx.stroke();
      }

      // axis labels
      ctx.fillStyle="rgba(229,231,235,.72)";
      ctx.font="700 18px ui-sans-serif, system-ui";
      ctx.fillText("Trend (safe placeholder)", pad, pad-14);

      // make 3 lines based on counts so it changes day by day
      const total=Math.max(1, counts.total);
      const p=counts.pos/total;
      const n=counts.neg/total;
      const u=(counts.unk)/total;

      function line(color, seed){
        ctx.strokeStyle=color;
        ctx.lineWidth=3;
        ctx.beginPath();
        for(let i=0;i<=28;i++){
          const t=i/28;
          // wave with bias from share
          const base = 0.5 + (seed-0.5)*0.35;
          const yv = base + Math.sin((t*6.28*2) + seed*3.7)*0.08 + Math.sin((t*6.28*6) + seed*1.3)*0.03;
          const yy = pad + (h-pad*2) * (1 - clamp(yv,0.1,0.9));
          const xx = pad + (w-pad*2) * t;
          if(i===0) ctx.moveTo(xx,yy);
          else ctx.lineTo(xx,yy);
        }
        ctx.stroke();
      }

      line("rgba(45,212,191,.95)", p); // positive-ish
      line("rgba(251,113,133,.92)", n); // negative-ish
      line("rgba(105,169,255,.92)", u); // unknown-ish
    }

    function openJSON(){ window.open(JSON_PATH,"_blank","noopener"); }

    async function main(){
      $("open_json").addEventListener("click", openJSON);

      const imageMap = await buildImageMap();

      const r=await fetch(JSON_PATH,{cache:"no-store"});
      if(!r.ok) return;

      const j=await r.json();
      let items=j.items || j.articles || j.events || [];
      if(!Array.isArray(items)) items=[];

      $("as_of").textContent=`as_of: ${j.as_of || j.date || "--"}`;
      $("source").textContent=`source: ${j.source || j.raw_file || JSON_PATH}`;
      const gen=j.generated_at || "";
      const fetched=j.news_fetched_at || j.fetched_at || "";
      $("meta_line").textContent=`generated_at=${gen || "--"} / news_fetched_at=${fetched || "--"}`;

      let pos=0,neg=0,neu=0,mix=0,unk=0;
      for(const it of items){
        const label=normLabel(it.label || it.sentiment || it.class || it.bucket);
        if(label==="positive") pos++;
        else if(label==="negative") neg++;
        else if(label==="neutral") neu++;
        else if(label==="mixed") mix++;
        else unk++;
      }

      const total=items.length;
      renderKPI(total,pos,neg,neu,mix,unk);
      renderBalance(pos,neg);

      // graph (safe)
      drawSafeTrend($("trend_canvas"), {total, pos, neg, neu, mix, unk});

      const rerender=()=>applyQueryAndRender(items,imageMap);
      $("q").addEventListener("input", rerender);
      $("filter_label").addEventListener("change", rerender);
      $("sort_mode").addEventListener("change", rerender);
      rerender();
    }

    main().catch(()=>{});
  </script>
</body>
</html>
