<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home - GenesisPrediction v2</title>
  <link rel="stylesheet" href="/static/app.css?v=20260303v2" />
  <script src="/static/_shared_nav.js?v=20260303v2"></script>
</head>
<body>
<main class="gp-main">
  <div class="page gp-page gp-page--sentiment">
    <section class="panel">
      <div class="h1">Home</div>
      <p class="sub">Today snapshot / Daily summary / Sentiment / Data health をまとめて表示します。</p>

      <div class="grid2" style="margin-top:12px;">
        <div class="card">
          <div class="sectionTitle">
            <h2>Events (today)</h2>
            <span id="evHint" class="hint">loading…</span>
          </div>
          <div id="evBody" class="mono small">loading…</div>
          <div class="pillrow" style="margin-top:10px;">
            <span id="evSource" class="pill">source: --</span>
          </div>
        </div>

        <div class="card">
          <div class="sectionTitle">
            <h2>Data Health</h2>
            <span id="healthHint" class="hint">loading…</span>
          </div>
          <div id="healthBody" class="mono small">loading…</div>
          <div class="pillrow" style="margin-top:10px;">
            <a id="btnOpenHealth" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open JSON</a>
            <span id="healthSource" class="pill">source: --</span>
          </div>
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div class="card">
          <div class="sectionTitle">
            <h2>Sentiment</h2>
            <span id="senHint" class="hint">loading…</span>
          </div>
          <div id="senBody" class="mono small">loading…</div>
          <div class="pillrow" style="margin-top:10px;">
            <span id="senSource" class="pill">source: --</span>
          </div>
        </div>

        <div class="card">
          <div class="sectionTitle">
            <h2>Daily Summary</h2>
            <span id="sumHint" class="hint">loading…</span>
          </div>
          <div id="sumBody" class="mono small">loading…</div>
          <div class="pillrow" style="margin-top:10px;">
            <a id="btnOpenSummary" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open JSON</a>
            <span id="sumSource" class="pill">source: --</span>
          </div>
        </div>
      </div>

      <div class="pillrow" style="margin-top:14px;">
        <span id="pillAsOf" class="pill">as_of: --</span>
        <span id="pillReady" class="pill">Ready</span>
      </div>
    </section>
  </div>
</main>

<script>
(function(){
  "use strict";

  function safeText(x){ return (x==null) ? "" : String(x); }
  function setText(id, v){ var el=document.getElementById(id); if(el) el.textContent = safeText(v); }
  function setHref(id, v){ var el=document.getElementById(id); if(el) el.href = v || "#"; }

  async function fetchJson(url){
    const r = await fetch(url, {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  }

  // Home は “digest の latest” を最優先で探す（Sentiment と同じ思想）
  const CANDIDATES = {
    viewModel: [
      "/data/digest/view_model_latest.json",
      "/data/world_politics/analysis/view_model_latest.json"
    ],
    health: [
      "/data/digest/health_latest.json",
      "/data/world_politics/analysis/health_latest.json"
    ],
    summary: [
      "/data/digest/daily_summary_latest.json",
      "/data/world_politics/analysis/daily_summary_latest.json"
    ],
    sentiment: [
      "/data/digest/sentiment_latest.json",
      "/data/world_politics/analysis/sentiment_latest.json"
    ]
  };

  async function pickFirstOk(urls){
    for(const u of urls){
      try{
        const j = await fetchJson(u);
        return {url:u, json:j};
      }catch(_e){}
    }
    return null;
  }

  function renderKV(obj){
    // シンプルに見やすく（Homeは“要点だけ”）
    const lines = [];
    for(const [k,v] of Object.entries(obj||{})){
      if(v==null) continue;
      if(typeof v === "object") continue;
      lines.push(k + ": " + String(v));
    }
    return lines.join("\n");
  }

  function renderHealth(h){
    if(!h) return "—";
    const date = h.date || h.as_of || "";
    const total = (h.total!=null)? h.total : (Array.isArray(h.checks)? h.checks.length : "");
    const ok = h.ok_count ?? h.OK ?? "";
    const warn = h.warn_count ?? h.WARN ?? "";
    const ng = h.ng_count ?? h.NG ?? "";
    const parts = [];
    if(date) parts.push("date=" + date);
    if(total!=="") parts.push("total=" + total);
    if(ok!=="") parts.push("OK=" + ok);
    if(warn!=="") parts.push("WARN=" + warn);
    if(ng!=="") parts.push("NG=" + ng);
    return parts.join("  ");
  }

  function renderSentiment(s){
    if(!s) return "—";
    const date = s.date || s.as_of || "";
    const items = Array.isArray(s.items) ? s.items.length : (s.total_items ?? "");
    let avgRisk = "", avgPos = "", avgUnc = "";
    try{
      if(Array.isArray(s.items) && s.items.length){
        let r=0,p=0,u=0,n=0;
        for(const it of s.items){
          if(typeof it.risk==="number"){ r+=it.risk; n++; }
          if(typeof it.positive==="number"){ p+=it.positive; }
          if(typeof it.uncertainty==="number"){ u+=it.uncertainty; }
        }
        if(n){
          avgRisk = (r/n).toFixed(2);
          avgPos  = (p/n).toFixed(2);
          avgUnc  = (u/n).toFixed(2);
        }
      }
    }catch(_e){}
    const parts = [];
    if(date) parts.push("date=" + date);
    if(items!=="") parts.push("items=" + items);
    if(avgRisk!=="") parts.push("risk=" + avgRisk + " / pos=" + avgPos + " / unc=" + avgUnc);
    return parts.join("  ");
  }

  function renderSummary(sum){
    if(!sum) return "—";
    const text = (typeof sum.summary === "string" && sum.summary.trim()) ? sum.summary.trim() : "";
    if(text) return text.split("\n").slice(0,6).join("\n");
    // yesterday_summary 形式
    if(sum.yesterday_summary){
      if(typeof sum.yesterday_summary.text === "string" && sum.yesterday_summary.text.trim()){
        return sum.yesterday_summary.text.trim().split("\n").slice(0,6).join("\n");
      }
      if(Array.isArray(sum.yesterday_summary.titles) && sum.yesterday_summary.titles.length){
        return sum.yesterday_summary.titles.slice(0,8).map(t=>"• "+safeText(t)).join("\n");
      }
    }
    return renderKV(sum);
  }

  (async function main(){
    try{
      const vm = await pickFirstOk(CANDIDATES.viewModel);
      if(vm && vm.json){
        setText("evHint", "OK");
        setText("evBody", renderKV(vm.json).slice(0, 1200));
        setText("evSource", "source: " + vm.url);
        setText("pillAsOf", "as_of: " + (vm.json.date || vm.json.as_of || "--"));
      }else{
        setText("evHint", "missing");
      }

      const h = await pickFirstOk(CANDIDATES.health);
      if(h && h.json){
        setText("healthHint", "OK");
        setText("healthBody", renderHealth(h.json));
        setText("healthSource", "source: " + h.url);
        setHref("btnOpenHealth", h.url);
      }else{
        setText("healthHint", "missing");
      }

      const s = await pickFirstOk(CANDIDATES.sentiment);
      if(s && s.json){
        setText("senHint", "OK");
        setText("senBody", renderSentiment(s.json));
        setText("senSource", "source: " + s.url);
      }else{
        setText("senHint", "missing");
      }

      const sum = await pickFirstOk(CANDIDATES.summary);
      if(sum && sum.json){
        setText("sumHint", "OK");
        setText("sumBody", renderSummary(sum.json));
        setText("sumSource", "source: " + sum.url);
        setHref("btnOpenSummary", sum.url);
      }else{
        setText("sumHint", "missing");
      }

    }catch(e){
      setText("pillReady", "Error");
      console.warn(e);
    }
  })();

})();
</script>
</body>
</html>
