<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digest - GenesisPrediction v2</title>
  <link rel="stylesheet" href="/static/app.css?v=20260303v2" />
  <script src="/static/_shared_nav.js?v=20260303v2"></script>
</head>
<body>
<main class="gp-main">
  <div class="page gp-page gp-page--sentiment">
    <section class="panel">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap;">
        <div>
          <div class="h1">Digest</div>
          <p class="sub">Daily summary + top highlights (robust / safe).</p>
        </div>
        <div class="pillrow">
          <span id="pillAsOf" class="pill">as_of: --</span>
          <span id="pillSource" class="pill">source: --</span>
          <span id="pillItems" class="pill">items: --</span>
          <a id="btnOpenJson" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open JSON</a>
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div class="card">
          <div class="sectionTitle">
            <h2>Summary</h2>
            <span id="sumHint" class="hint">loading…</span>
          </div>

          <pre id="sumText" class="summaryText">loading…</pre>

          <div class="toolbar">
            <div class="tool-left">
              <input id="q" class="search" type="search" placeholder="Search title/source…" />
              <select id="sentFilter" class="select">
                <option value="all">All</option>
                <option value="positive">Positive</option>
                <option value="negative">Negative</option>
                <option value="neutral">Neutral</option>
                <option value="mixed">Mixed</option>
                <option value="unknown">Unknown</option>
              </select>
              <select id="sortKey" class="select">
                <option value="score">Top (score)</option>
                <option value="risk">Risk</option>
                <option value="positive">Positive</option>
                <option value="uncertainty">Uncertainty</option>
                <option value="net">Net</option>
              </select>
              <button id="btnCollapse" class="btn" type="button">Collapse summary</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="sectionTitle">
            <h2>KPIs</h2>
            <span id="kpiHint" class="hint">loading…</span>
          </div>
          <div id="kpis" class="mono small">loading…</div>
        </div>
      </div>

      <div class="card" style="margin-top:12px;">
        <div class="sectionTitle">
          <h2>Top highlights</h2>
          <span id="listHint" class="hint">loading…</span>
        </div>
        <div id="list" class="digestList">loading…</div>
      </div>

    </section>
  </div>
</main>

<script>
(function(){
  "use strict";

  function safeText(x){ return (x==null) ? "" : String(x); }
  function escHtml(s){
    s = safeText(s);
    return s.replace(/[&<>"']/g, function(ch){
      return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[ch];
    });
  }

  async function fetchJson(url){
    const r = await fetch(url, {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  }

  async function pickFirstOk(urls){
    for(const u of urls){
      try{
        const j = await fetchJson(u);
        return {url:u, json:j};
      }catch(_e){}
    }
    return null;
  }

  const SUM_CANDIDATES = [
    "/data/world_politics/analysis/daily_summary_latest.json",
    "/data/digest/daily_summary_latest.json"
  ];

  const NEWS_CANDIDATES = [
    "/data/world_politics/analysis/daily_news_latest.json",
    "/data/digest/daily_news_latest.json"
  ];

  const SEN_CANDIDATES = [
    "/data/world_politics/analysis/sentiment_latest.json",
    "/data/digest/sentiment_latest.json"
  ];

  function pickSummaryText(sumRoot){
    if(!sumRoot) return "";
    if(sumRoot.yesterday_summary){
      if(typeof sumRoot.yesterday_summary.text === "string" && sumRoot.yesterday_summary.text.trim()){
        return sumRoot.yesterday_summary.text.trim();
      }
      if(Array.isArray(sumRoot.yesterday_summary.titles) && sumRoot.yesterday_summary.titles.length){
        var lines = sumRoot.yesterday_summary.titles.slice(0, 30).map(function(t){
          return "- " + safeText(t);
        });
        return "Yesterday titles:\\n" + lines.join("\\n");
      }
    }
    if(typeof sumRoot.summary === "string" && sumRoot.summary.trim()) return sumRoot.summary.trim();
    return "";
  }

  function pickArticles(anyRoot){
    if(!anyRoot) return [];
    if(Array.isArray(anyRoot.items)) return anyRoot.items;
    if(Array.isArray(anyRoot.articles)) return anyRoot.articles;
    if(anyRoot.yesterday_summary && Array.isArray(anyRoot.yesterday_summary.items)) return anyRoot.yesterday_summary.items;
    return [];
  }

  function normalizeArticle(a){
    a = a || {};
    var srcName = "";
    try{
      if(a.source){
        if(typeof a.source === "string") srcName = a.source;
        else if(typeof a.source.name === "string") srcName = a.source.name;
        else if(typeof a.source.id === "string") srcName = a.source.id;
      }
    }catch(_e){}
    var title = safeText(a.title || a.headline || "");
    var url = safeText(a.url || "");
    var desc = safeText(a.description || a.summary || "");
    return {
      title: title,
      url: url,
      source: srcName || safeText(a.publisher || a.site || ""),
      score: (typeof a.score==="number") ? a.score : (typeof a.importance==="number" ? a.importance : 0),
      risk: (typeof a.risk==="number") ? a.risk : null,
      positive: (typeof a.positive==="number") ? a.positive : null,
      uncertainty: (typeof a.uncertainty==="number") ? a.uncertainty : null,
      net: (typeof a.net==="number") ? a.net : null,
      sentiment: safeText(a.sentiment || a.label || ""),
      description: desc
    };
  }

  function metricPill(val, kind){
    if(typeof val !== "number") return "<span class='mp mp--na'>--</span>";
    var cls = "mp";
    if(kind==="risk"){
      cls += (val>=0.35) ? " mp--riskHi" : (val>=0.15) ? " mp--riskMd" : " mp--riskLo";
    }else if(kind==="positive"){
      cls += (val>=0.20) ? " mp--posHi" : (val>=0.05) ? " mp--posMd" : " mp--posLo";
    }else if(kind==="uncertainty"){
      cls += (val>=0.30) ? " mp--uncHi" : (val>=0.18) ? " mp--uncMd" : " mp--uncLo";
    }else if(kind==="net"){
      cls += (val<=-0.20) ? " mp--netNeg" : (val>=0.20) ? " mp--netPos" : " mp--netMid";
    }
    return "<span class='"+cls+"'>" + val.toFixed(3) + "</span>";
  }

  function computeKpis(items){
    var total = items.length;
    var pos=0, neg=0, neu=0, mix=0, unk=0;
    var netSum=0, netN=0;
    for(const it of items){
      var s = (it.sentiment||"").toLowerCase();
      if(s==="positive") pos++;
      else if(s==="negative") neg++;
      else if(s==="neutral") neu++;
      else if(s==="mixed") mix++;
      else unk++;
      if(typeof it.net==="number"){ netSum += it.net; netN++; }
    }
    var avgNet = netN ? (netSum/netN) : 0;
    return {
      total: total,
      pos: pos, neg: neg, neu: neu, mix: mix, unk: unk,
      avgNet: avgNet
    };
  }

  function renderKpis(k){
    return [
      "total_articles",
      k.total,
      "",
      "Positive", k.pos,
      "Negative", k.neg,
      "Neutral",  k.neu,
      "Mixed",    k.mix,
      "Unknown",  k.unk,
      "",
      "Sentiment balance",
      "pos=" + k.pos + " / neg=" + k.neg + " / neu=" + k.neu + " / mix=" + k.mix + " / unk=" + k.unk,
      "avg_net=" + k.avgNet.toFixed(3)
    ].join("\\n");
  }

  function applyFilters(list, q, sent){
    q = (q||"").trim().toLowerCase();
    sent = (sent||"all").toLowerCase();
    return list.filter(function(it){
      if(q){
        var hay = (it.title + " " + it.source).toLowerCase();
        if(hay.indexOf(q)===-1) return false;
      }
      if(sent!=="all"){
        if((it.sentiment||"").toLowerCase() !== sent) return false;
      }
      return true;
    });
  }

  function sortItems(list, key){
    key = key || "score";
    var arr = list.slice();
    arr.sort(function(a,b){
      function num(x){ return (typeof x==="number") ? x : -999999; }
      if(key==="risk") return num(b.risk)-num(a.risk);
      if(key==="positive") return num(b.positive)-num(a.positive);
      if(key==="uncertainty") return num(b.uncertainty)-num(a.uncertainty);
      if(key==="net") return num(b.net)-num(a.net);
      return num(b.score)-num(a.score);
    });
    return arr;
  }

  function renderList(items){
    if(!items.length) return "<div class='hint'>no items</div>";
    return items.slice(0, 60).map(function(it){
      var title = escHtml(it.title || "(no title)");
      var url = escHtml(it.url || "#");
      var src = escHtml(it.source || "");
      var desc = escHtml(it.description || "");
      return (
        "<div class='digestRow'>" +
          "<div class='digestMain'>" +
            "<div class='digestTitle'><a class='a-soft' href='"+url+"' target='_blank' rel='noopener noreferrer'>"+title+"</a></div>" +
            "<div class='digestMeta mono small'>" + src + "</div>" +
            (desc ? ("<div class='digestDesc'>" + desc + "</div>") : "") +
          "</div>" +
          "<div class='digestMetrics'>" +
            metricPill(it.risk, "risk") +
            metricPill(it.positive, "positive") +
            metricPill(it.uncertainty, "uncertainty") +
            metricPill(it.net, "net") +
          "</div>" +
        "</div>"
      );
    }).join("");
  }

  function setText(id,v){ var el=document.getElementById(id); if(el) el.textContent = safeText(v); }
  function setHtml(id,v){ var el=document.getElementById(id); if(el) el.innerHTML = v; }

  var allItems = [];
  var collapsed = false;

  async function load(){
    setText("sumHint","loading…");
    setText("kpiHint","loading…");
    setText("listHint","loading…");

    const sumPick = await pickFirstOk(SUM_CANDIDATES);
    const newsPick = await pickFirstOk(NEWS_CANDIDATES);
    const senPick = await pickFirstOk(SEN_CANDIDATES);

    const src = (sumPick ? sumPick.url : (newsPick?newsPick.url:"--"));
    const asOf = (sumPick && sumPick.json) ? (sumPick.json.date || sumPick.json.as_of || "--") : "--";

    setText("pillAsOf", "as_of: " + asOf);
    setText("pillSource", "source: " + src);
    document.getElementById("btnOpenJson").href = (sumPick ? sumPick.url : "#");

    // summary text
    var sumText = "";
    if(sumPick && sumPick.json) sumText = pickSummaryText(sumPick.json);
    if(!sumText && newsPick && newsPick.json){
      // daily_news しかない時の fallback
      var tmp = pickArticles(newsPick.json).slice(0, 30).map(function(a){
        return "- " + safeText(a.title || "");
      }).join("\\n");
      sumText = tmp ? ("Today titles:\\n" + tmp) : "";
    }
    if(!sumText) sumText = "OK";
    document.getElementById("sumText").textContent = sumText;
    setText("sumHint", "OK");

    // items：news + sentiment を “なるべく寄せる”
    var base = [];
    if(newsPick && newsPick.json) base = pickArticles(newsPick.json).map(normalizeArticle);
    // sentiment 側の risk/pos/unc/net を news の url に寄せて補完
    if(senPick && senPick.json && Array.isArray(senPick.json.items) && base.length){
      var map = new Map();
      for(const s of senPick.json.items){
        if(s && s.url) map.set(String(s.url), s);
      }
      for(const b of base){
        const s = map.get(String(b.url));
        if(s){
          if(typeof s.risk==="number") b.risk = s.risk;
          if(typeof s.positive==="number") b.positive = s.positive;
          if(typeof s.uncertainty==="number") b.uncertainty = s.uncertainty;
          if(typeof s.net==="number") b.net = s.net;
          if(typeof s.sentiment==="string") b.sentiment = s.sentiment;
        }
      }
    }

    allItems = base;
    setText("pillItems", "items: " + allItems.length);

    // KPIs
    const k = computeKpis(allItems);
    document.getElementById("kpis").textContent = renderKpis(k);
    setText("kpiHint","OK");

    // list
    rerender();
    setText("listHint","OK");
  }

  function rerender(){
    const q = document.getElementById("q").value;
    const sent = document.getElementById("sentFilter").value;
    const sortKey = document.getElementById("sortKey").value;

    const filtered = applyFilters(allItems, q, sent);
    const sorted = sortItems(filtered, sortKey);

    setHtml("list", renderList(sorted));
  }

  document.getElementById("q").addEventListener("input", rerender);
  document.getElementById("sentFilter").addEventListener("change", rerender);
  document.getElementById("sortKey").addEventListener("change", rerender);

  document.getElementById("btnCollapse").addEventListener("click", function(){
    collapsed = !collapsed;
    document.getElementById("sumText").style.maxHeight = collapsed ? "120px" : "";
    document.getElementById("sumText").style.overflow = collapsed ? "auto" : "";
    document.getElementById("btnCollapse").textContent = collapsed ? "Expand summary" : "Collapse summary";
  });

  load().catch(function(e){
    console.warn(e);
    setText("sumHint","error");
    setText("kpiHint","error");
    setText("listHint","error");
  });

})();
</script>
</body>
</html>
