<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Digest - GenesisPrediction v2</title>

  <link rel="stylesheet" href="/static/app.css" />

  <style>
    :root{
      --bg0:#070b14;
      --bg1:#0b1327;
      --stroke:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --pill:rgba(105,169,255,.18);
      --pillStroke:rgba(105,169,255,.35);
      --focus:rgba(105,169,255,.55);

      --pos: rgba(60,210,140,.95);
      --neg: rgba(255,110,110,.95);
      --neu: rgba(200,210,230,.70);
      --mix: rgba(255,196,70,.95);
      --unk: rgba(160,170,190,.60);
    }
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", "Meiryo", Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(105,169,255,.18), transparent 55%),
        radial-gradient(900px 500px at 85% 15%, rgba(255,196,70,.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-y:auto;
    }
    .container{max-width:1150px; margin:0 auto; padding:18px 14px 46px;}
    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:14px;
      padding:14px 14px; border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
    }
    .brand{display:flex; align-items:center; gap:10px; min-width: 220px;}
    .brand .dot{
      width:12px; height:12px; border-radius:999px;
      background:rgba(105,169,255,.95); box-shadow:0 0 0 5px rgba(105,169,255,.18);
    }
    .brand .t1{font-weight:800; letter-spacing:.2px;}
    .brand .t2{font-size:12px; color:var(--muted); margin-top:2px;}
    nav{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;}
    nav a{
      text-decoration:none; color:var(--text);
      font-weight:700; font-size:13px;
      padding:8px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
    }
    nav a:hover{border-color:rgba(105,169,255,.5)}
    nav a.active{
      border-color:var(--pillStroke);
      background:var(--pill);
    }

    .grid{display:grid; grid-template-columns: 1fr; gap:14px; margin-top:14px;}
    .card{
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .card-h{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
      padding:14px 14px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .card-h h1{margin:0; font-size:16px; letter-spacing:.2px}
    .meta{display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:flex-end;}
    .pill{
      font-size:12px; font-weight:800; color:rgba(255,255,255,.86);
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
      padding:6px 10px; border-radius:999px;
      white-space:nowrap;
    }
    .pill.muted{color:var(--muted)}
    .pill.linklike{cursor:pointer}
    .pill.linklike:hover{border-color:rgba(105,169,255,.5)}

    .body{padding:14px;}

    .hero{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:12px;
      margin-bottom:14px;
    }
    .heroBox{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.14);
      border-radius:16px;
      padding:12px;
      overflow:hidden;
    }
    .heroTitle{
      margin:0 0 6px;
      font-size:14px;
      font-weight:900;
      letter-spacing:.2px;
    }
    .heroText{
      margin:0;
      color:rgba(255,255,255,.74);
      font-size:12px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .kpis{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
    .kpi{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      border-radius:14px;
      padding:10px 12px;
      min-width: 120px;
    }
    .kpi .k{font-size:11px; color:rgba(255,255,255,.64); font-weight:900}
    .kpi .v{font-size:16px; font-weight:1000; margin-top:2px}
    .kpi .s{font-size:11px; color:rgba(255,255,255,.62); font-weight:800; margin-top:2px}

    .tools{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin:10px 0 0}
    .search{
      flex:1;
      min-width: 220px;
      font-size:13px;
      font-weight:800;
      letter-spacing:.1px;
      color:rgba(255,255,255,.92);
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      outline:none;
    }
    .search:focus{border-color:var(--focus); box-shadow: 0 0 0 4px rgba(105,169,255,.15)}
    .select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      font-size:13px;
      font-weight:900;
      letter-spacing:.2px;
      color:rgba(255,255,255,.92);
      padding:10px 34px 10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      outline:none;
      cursor:pointer;
      position:relative;
    }
    .select:focus{border-color: var(--focus); box-shadow: 0 0 0 4px rgba(105,169,255,.15)}
    .select-wrap{position:relative; display:inline-flex; align-items:center}
    .select-wrap:after{
      content:"▾";
      position:absolute;
      right:12px;
      top:50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.72);
      pointer-events:none;
      font-size:12px;
      font-weight:900;
    }

    /* Big cards */
    .list{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      margin-top:12px;
    }
    .item{
      position:relative;
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:14px;
      padding:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      border-radius:18px;
      overflow:hidden;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .item:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 40px rgba(0,0,0,.28);
      border-color: rgba(255,255,255,.18);
    }
    .thumb{
      width:100%;
      height:180px;
      border-radius:16px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      overflow:hidden;
    }
    .thumb img{width:100%; height:100%; object-fit:cover; display:block}
    .title{margin:0; font-size:16px; line-height:1.35; letter-spacing:.1px}
    .title a{color:rgba(255,255,255,.92); text-decoration:none}
    .title a:hover{text-decoration:underline}
    .desc{margin:8px 0 0; color:rgba(255,255,255,.74); font-size:13px; line-height:1.6}
    .tmeta{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px}
    .src{color:rgba(255,255,255,.82); font-size:12px; font-weight:900}
    .time{color:rgba(255,255,255,.62); font-size:12px; font-weight:800}

    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:999px;
      font-weight:1000; font-size:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
    }
    .badge .led{width:8px; height:8px; border-radius:999px; background:rgba(255,255,255,.35)}
    .badge.pos{border-color: rgba(60,210,140,.35); background: rgba(60,210,140,.10)}
    .badge.pos .led{background: var(--pos)}
    .badge.neg{border-color: rgba(255,110,110,.35); background: rgba(255,110,110,.10)}
    .badge.neg .led{background: var(--neg)}
    .badge.neu{border-color: rgba(105,169,255,.26); background: rgba(105,169,255,.08)}
    .badge.neu .led{background: rgba(105,169,255,.85)}
    .badge.mix{border-color: rgba(255,196,70,.35); background: rgba(255,196,70,.10)}
    .badge.mix .led{background: var(--mix)}
    .badge.unk{border-color: rgba(160,170,190,.25); background: rgba(160,170,190,.06)}
    .badge.unk .led{background: var(--unk)}

    details{margin-top:12px}
    details summary{cursor:pointer; color:rgba(255,255,255,.84); font-weight:900}
    pre{
      margin:10px 0 0;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.22);
      color:rgba(255,255,255,.86);
      overflow:auto;
      font-size:12px;
      line-height:1.45;
      white-space:pre-wrap;
      word-break:break-word;
    }

    @media (max-width: 920px){
      .hero{grid-template-columns: 1fr}
      .item{grid-template-columns: 1fr}
      .thumb{height:200px}
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="dot" aria-hidden="true"></div>
        <div>
          <div class="t1">GenesisPrediction v2</div>
          <div class="t2">Digest / Highlights</div>
        </div>
      </div>

      <nav aria-label="primary">
        <a class="nav-link" href="/static/index.html">Home</a>
        <a class="nav-link" href="/static/overlay.html">Overlay</a>
        <a class="nav-link" href="/static/sentiment.html">Sentiment</a>
        <a class="nav-link active" href="/static/digest.html">Digest</a>
      </nav>
    </div>

    <div class="grid">
      <section class="card">
        <header class="card-h">
          <h1>Digest</h1>
          <div class="meta">
            <span class="pill muted" id="asof">as_of: --</span>
            <span class="pill muted" id="srcpill">source: --</span>
            <span class="pill muted" id="countpill">items: --</span>
            <span class="pill linklike" id="open-json">Open JSON</span>
          </div>
        </header>

        <div class="body">
          <div class="hero">
            <div class="heroBox">
              <div class="heroTitle">Summary</div>
              <p class="heroText" id="summary">loading...</p>
              <div class="tools">
                <input class="search" id="q" placeholder="Search title/source..." />
                <span class="select-wrap" title="Sort">
                  <select class="select" id="sort">
                    <option value="new">Newest</option>
                    <option value="old">Oldest</option>
                    <option value="src">Source</option>
                  </select>
                </span>
              </div>
            </div>

            <div class="heroBox">
              <div class="heroTitle">KPIs</div>
              <div class="kpis" id="kpis">
                <div class="kpi"><div class="k">Total</div><div class="v">--</div><div class="s">articles</div></div>
                <div class="kpi"><div class="k">Positive</div><div class="v">--</div><div class="s">count</div></div>
                <div class="kpi"><div class="k">Negative</div><div class="v">--</div><div class="s">count</div></div>
                <div class="kpi"><div class="k">Neutral</div><div class="v">--</div><div class="s">count</div></div>
                <div class="kpi"><div class="k">Mixed</div><div class="v">--</div><div class="s">count</div></div>
                <div class="kpi"><div class="k">Unknown</div><div class="v">--</div><div class="s">count</div></div>
              </div>
            </div>
          </div>

          <div class="list" id="list"></div>

          <details>
            <summary>raw (debug)</summary>
            <pre id="debug">{}</pre>
          </details>
        </div>
      </section>
    </div>
  </div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const elAsOf = $("asof");
  const elSrc = $("srcpill");
  const elCount = $("countpill");
  const btnOpen = $("open-json");
  const elSummary = $("summary");
  const elList = $("list");
  const elDbg = $("debug");
  const elQ = $("q");
  const elSort = $("sort");
  const elKpis = $("kpis");

  function safeJson(obj){
    try { return JSON.stringify(obj, null, 2); } catch(e){ return String(obj); }
  }
  function setText(el, text){ el.textContent = text; }
  function escapeHtml(s){
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
  }
  function escapeAttr(s){
    return String(s).replaceAll('"',"&quot;");
  }

  async function fetchJson(url){
    const res = await fetch(url, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP " + res.status + " for " + url);
    return await res.json();
  }

  // Digest candidates (safe + flexible)
  const candidates = [
    "/analysis/world_politics/analysis/daily_summary_latest.json",
    "/analysis/world_politics/daily_summary_latest.json",
    "/analysis/daily_summary_latest.json",
    "/data/world_politics/analysis/daily_summary_latest.json",
    "/data/world_politics/analysis/daily_news_latest.json",
    "/analysis/world_politics/analysis/daily_news_latest.json",
    "/analysis/world_politics/daily_news_latest.json"
  ];

  async function pick(){
    for(const url of candidates){
      try{
        const j = await fetchJson(url);
        return { url, json: j };
      }catch(e){ /* ignore */ }
    }
    return null;
  }

  function pickAsOf(root){
    return root.as_of ?? root.asof ?? root.date ?? root.day ?? root.generated_at ?? root.updated_at ?? null;
  }

  function normalizeSourceVal(v){
    if(v == null) return "";
    if(typeof v === "string") return v;
    if(typeof v === "number") return String(v);
    if(typeof v === "object"){
      const inner = v.name ?? v.title ?? v.source ?? v.provider ?? v.id ?? null;
      if(inner != null && typeof inner !== "object") return String(inner);
      for(const k of ["name","title","id","domain","publisher"]){
        if(v[k] != null && typeof v[k] !== "object") return String(v[k]);
      }
      return "";
    }
    return String(v);
  }
  function articleSource(a){
    return normalizeSourceVal(a.source ?? a.source_name ?? a.provider ?? a.publisher ?? a.site ?? "");
  }

  function fmtTimeVal(v){
    if(v == null) return "";
    if(typeof v === "string") return v;
    if(typeof v === "number") return String(v);
    if(typeof v === "object"){
      const inner = v.iso ?? v.date ?? v.datetime ?? v.time ?? v.value ?? v.publishedAt ?? v.published_at ?? null;
      if(inner != null) return fmtTimeVal(inner);
      try { return JSON.stringify(v); } catch(e){ return ""; }
    }
    return String(v);
  }
  function fmtTime(v){
    const s = fmtTimeVal(v);
    if(!s) return "";
    return String(s).replace("T"," ").replace("Z","");
  }

  function normLabel(raw){
    const s = (raw == null ? "" : String(raw)).toLowerCase();
    if(!s) return "unk";
    if(s.includes("pos") || s.includes("good") || s.includes("bull")) return "pos";
    if(s.includes("neg") || s.includes("bad") || s.includes("bear")) return "neg";
    if(s.includes("neu") || s.includes("neutral")) return "neu";
    if(s.includes("mix") || s.includes("both")) return "mix";
    if(s === "0") return "neu";
    return "unk";
  }
  function labelFromScore(score){
    const n = Number(score);
    if(!Number.isFinite(n)) return "unk";
    if(n > 0.15) return "pos";
    if(n < -0.15) return "neg";
    return "neu";
  }
  function articleLabel(a){
    if(a == null) return "unk";
    const cand = a.sentiment_label ?? a.label ?? a.sentiment ?? a.polarity_label ?? a.class ?? null;
    if(cand != null && typeof cand !== "object") return normLabel(cand);
    if(cand != null && typeof cand === "object"){
      const inner = cand.label ?? cand.sentiment ?? cand.polarity ?? cand.name ?? null;
      if(inner != null) return normLabel(inner);
    }
    const score = a.sentiment_score ?? a.score ?? a.polarity ?? a.compound ?? a.vader ?? null;
    if(score != null && typeof score !== "object") return labelFromScore(score);
    if(score != null && typeof score === "object"){
      const inner = score.compound ?? score.score ?? score.value ?? null;
      if(inner != null) return labelFromScore(inner);
    }
    return "unk";
  }
  function badgeHtml(lbl){
    const map = {pos:"Positive", neg:"Negative", neu:"Neutral", mix:"Mixed", unk:"Unknown"};
    const name = map[lbl] || "Unknown";
    return `<span class="badge ${lbl}"><span class="led" aria-hidden="true"></span>${name}</span>`;
  }

  function pickArticles(root){
    if(!root) return [];
    if(Array.isArray(root.articles)) return root.articles;
    if(Array.isArray(root.items)) return root.items;
    if(Array.isArray(root.news)) return root.news;
    if(Array.isArray(root.data)) return root.data;

    // Some summaries embed under payload/result
    const nested = root.payload ?? root.result ?? root.output ?? root.summary ?? root.daily ?? null;
    if(nested && typeof nested === "object"){
      if(Array.isArray(nested.articles)) return nested.articles;
      if(Array.isArray(nested.items)) return nested.items;
      if(Array.isArray(nested.news)) return nested.news;
    }
    return [];
  }

  function pickSummaryText(root){
    const keys = ["summary", "digest", "highlights", "overview", "text"];
    for(const k of keys){
      const v = root && root[k];
      if(typeof v === "string" && v.trim()) return v.trim();
      if(v && typeof v === "object"){
        const inner = v.text ?? v.summary ?? v.overview ?? null;
        if(typeof inner === "string" && inner.trim()) return inner.trim();
      }
    }
    // fallback: top bullets
    const bullets = root && (root.bullets ?? root.key_points ?? root.keyPoints ?? root.points ?? null);
    if(Array.isArray(bullets) && bullets.length){
      return bullets.slice(0,12).map(x => "• " + String(x)).join("\n");
    }
    return "";
  }

  function sortArticles(arr, mode){
    const a = arr.slice();
    function timeKey(x){
      const t = x.publishedAt ?? x.published_at ?? x.published ?? x.time ?? x.datetime ?? x.date ?? null;
      const s = fmtTime(t);
      return s || "";
    }
    if(mode === "old"){
      a.sort((x,y) => timeKey(x).localeCompare(timeKey(y)));
    }else if(mode === "src"){
      a.sort((x,y) => String(articleSource(x)).localeCompare(String(articleSource(y))));
    }else{
      a.sort((x,y) => timeKey(y).localeCompare(timeKey(x))); // new
    }
    return a;
  }

  function renderKpis(articles){
    const counts = {pos:0, neg:0, neu:0, mix:0, unk:0};
    for(const a of articles){
      const l = articleLabel(a);
      counts[l] = (counts[l] || 0) + 1;
    }
    const total = articles.length;
    const tpl = (k, v, s) => `<div class="kpi"><div class="k">${escapeHtml(k)}</div><div class="v">${escapeHtml(v)}</div><div class="s">${escapeHtml(s)}</div></div>`;
    elKpis.innerHTML = [
      tpl("Total", String(total), "articles"),
      tpl("Positive", String(counts.pos||0), "count"),
      tpl("Negative", String(counts.neg||0), "count"),
      tpl("Neutral",  String(counts.neu||0), "count"),
      tpl("Mixed",    String(counts.mix||0), "count"),
      tpl("Unknown",  String(counts.unk||0), "count"),
    ].join("");
  }

  function renderList(articles){
    const q = (elQ.value || "").toLowerCase().trim();
    const sorted = sortArticles(articles, elSort.value || "new");
    const filtered = sorted.filter(a => {
      if(!q) return true;
      const t = String(a.title ?? a.headline ?? "").toLowerCase();
      const s = String(articleSource(a) ?? "").toLowerCase();
      return t.includes(q) || s.includes(q);
    });

    elList.innerHTML = filtered.slice(0, 80).map(a => {
      const title = String(a.title ?? a.headline ?? "(no title)");
      const url = a.url ?? a.link ?? "#";
      const desc = String(a.description ?? a.summary ?? a.snippet ?? "").trim();
      const src = articleSource(a);
      const time = fmtTime(a.publishedAt ?? a.published_at ?? a.published ?? a.time ?? a.datetime ?? "");
      const img = a.urlToImage ?? a.image ?? a.image_url ?? a.thumbnail ?? "";
      const lbl = articleLabel(a);

      const srcHtml = src ? `<span class="src">${escapeHtml(src)}</span>` : "";
      const timeHtml = time ? `<span class="time">${escapeHtml(time)}</span>` : "";

      return `
        <article class="item">
          <div class="thumb">${img ? `<img referrerpolicy="no-referrer" loading="lazy" src="${escapeAttr(img)}" alt="">` : ""}</div>
          <div>
            <h2 class="title"><a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(title)}</a></h2>
            ${desc ? `<p class="desc">${escapeHtml(desc)}</p>` : ""}
            <div class="tmeta">
              ${badgeHtml(lbl)}
              ${srcHtml}
              ${timeHtml}
            </div>
          </div>
        </article>
      `;
    }).join("");

    if(filtered.length === 0){
      elList.innerHTML = `<div class="pill muted">No items (safe)</div>`;
    }
  }

  async function main(){
    const picked = await pick();
    if(!picked){
      setText(elAsOf, "as_of: --");
      setText(elSrc, "source: not found (safe)");
      setText(elCount, "items: --");
      setText(elSummary, "digest json not found (safe)");
      elDbg.textContent = safeJson({ tried: candidates });
      btnOpen.onclick = () => alert("digest json not found (safe)");
      elList.innerHTML = `<div class="pill muted">daily_summary_latest.json not found (safe)</div>`;
      return;
    }

    setText(elSrc, "source: " + picked.url);
    const asof = pickAsOf(picked.json);
    setText(elAsOf, "as_of: " + (asof ? String(asof) : "--"));
    btnOpen.onclick = () => window.open(picked.url, "_blank", "noopener,noreferrer");

    const articles = pickArticles(picked.json);
    setText(elCount, "items: " + String(articles.length));

    const summary = pickSummaryText(picked.json);
    setText(elSummary, summary || "No summary text (safe)");

    renderKpis(articles);
    renderList(articles);

    elQ.addEventListener("input", () => renderList(articles));
    elSort.addEventListener("change", () => renderList(articles));

    elDbg.textContent = safeJson({
      picked: picked.url,
      as_of: asof ?? null,
      items: articles.length,
      has_summary: Boolean(summary),
      note: "Digest tries daily_summary_latest first; falls back to daily_news_latest."
    });
  }

  main().catch(e => {
    elDbg.textContent = safeJson({ error: String(e) });
    setText(elSummary, "ERROR (safe): " + (e && e.message ? e.message : String(e)));
    elList.innerHTML = `<div class="pill muted">ERROR (safe)</div>`;
  });
})();
</script>

</body>
</html>
