<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overlay - GenesisPrediction v2</title>
  <link rel="stylesheet" href="/static/app.css?v=20260303v2" />
  <script src="/static/_shared_nav.js?v=20260303v2"></script>
</head>
<body>
<main class="page">
  <h1>Overlay</h1>
  <div class="muted2 small" style="margin-top:-6px">FX Overlay / Decision UI (safe mode).</div>

  <section class="card" style="margin-top:14px">
    <div class="card-title" style="display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <span class="mono small muted2">Pair</span>
        <select id="pairSel" class="pill" style="min-width:160px">
          <option value="auto">auto</option>
          <option value="jpythb" selected>JPYTHB</option>
          <option value="usdjpy">USDJPY</option>
          <option value="usdthb">USDTHB</option>
          <option value="multi">MULTI</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <a id="btnOpenDecision" class="pill ghost" target="_blank" rel="noopener">Open decision JSON</a>
      </div>
    </div>

    <div class="kv" style="margin-top:10px">
      <div class="mono small muted2">Decision</div>
      <div id="decisionText" class="mono">—</div>
      <div class="mono small muted2" style="margin-top:10px">Reason</div>
      <div id="reasonText" class="mono">—</div>
    </div>

    <div class="kv" style="margin-top:14px">
      <div class="mono small muted2">FX overlay</div>
      <div id="imgMsg" class="mono">loading…</div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <a id="btnOpenImage" class="pill ghost" target="_blank" rel="noopener" style="display:none">Open image</a>
      </div>
      <div style="margin-top:10px">
        <img id="overlayImg" alt="FX overlay" style="max-width:100%;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.35);display:none" />
      </div>
    </div>

    <details style="margin-top:14px">
      <summary class="mono small">raw (debug)</summary>
      <pre id="dbg" class="mono small" style="white-space:pre-wrap;word-break:break-word;margin-top:10px"></pre>
    </details>

    <div class="mono small muted2" style="margin-top:12px">
      Notes: Unified layout (header injected by JS). If something is missing, check that FX artifacts are published under <span class="mono">/data/fx/</span>.
    </div>
  </section>
</main>

<script>
(() => {
  const q = (id) => document.getElementById(id);

  // --- safe setters (never throw) ---
  const setText = (id, txt) => { const el = q(id); if (el) el.textContent = (txt ?? ""); };
  const setHtml = (id, html) => { const el = q(id); if (el) el.innerHTML = (html ?? ""); };

  const pairSel = q("pairSel");
  const img = q("overlayImg");
  const imgMsg = q("imgMsg");
  const btnOpenImage = q("btnOpenImage");
  const btnOpenDecision = q("btnOpenDecision");
  const dbg = q("dbg");

  // decision JSON candidates (prefer your current pipeline path)
  const decisionURLs = [
    "/data/fx/fx_decision_latest.json",
    "/data/fx/fx_decision_latest_jpythb.json",
    "/data/fx/fx_decision_latest_usdjpy.json",
    "/data/fx/fx_decision_latest_usdthb.json",
    "/analysis/fx/fx_decision_latest.json" // legacy fallback (ok if 404)
  ];

  // overlay image candidates per pair (ordered by "most likely to exist")
  const overlayCandidates = {
  "auto": [
    "/data/fx/fx_overlay_latest_jpythb.png",
    "/data/fx/fx_overlay_latest_usdjpy.png",
    "/data/fx/fx_overlay_latest_usdthb.png",
    "/data/fx/fx_overlay_multi_latest.png",
    "/data/fx/fx_overlay_latest.png",
    "/analysis/fx/fx_overlay_latest.png"
  ],
    "multi": [
      "/data/fx/fx_overlay_multi_latest.png",
      "/data/fx/fx_multi_overlay.png",
      "/data/fx/fx_multi_overlay_latest.png",
      "/analysis/fx/fx_overlay_multi_latest.png"
    ],
    "jpythb": [
      "/data/fx/fx_overlay_latest_jpythb.png",
      "/data/fx/fx_jpy_thb_overlay.png",
      "/data/fx/jpy_thb_remittance_overlay.png",
      "/analysis/fx/fx_overlay_latest_jpythb.png"
    ],
    "usdjpy": [
      "/data/fx/fx_overlay_latest_usdjpy.png",
      "/data/fx/fx_jpy_usd_overlay.png",
      "/analysis/fx/fx_overlay_latest_usdjpy.png"
    ],
    "usdthb": [
      "/data/fx/fx_overlay_latest_usdthb.png",
      "/data/fx/fx_multi_usd_thb_overlay.png",
      "/analysis/fx/fx_overlay_latest_usdthb.png"
    ],
    "auto": [
      "/data/fx/fx_overlay_multi_latest.png",
      "/data/fx/fx_multi_overlay.png",
      "/data/fx/fx_overlay_latest_jpythb.png",
      "/data/fx/fx_jpy_thb_overlay.png",
      "/data/fx/fx_overlay_latest_usdjpy.png",
      "/data/fx/fx_jpy_usd_overlay.png",
      "/data/fx/fx_overlay_latest_usdthb.png",
      "/data/fx/fx_multi_usd_thb_overlay.png",
      "/analysis/fx/fx_overlay_multi_latest.png"
    ]
  };

  const headOK = async (url) => {
    try {
      const r = await fetch(url, { method: "HEAD", cache: "no-store" });
      return r && r.ok;
    } catch (e) { return false; }
  };

  const firstOK = async (urls) => {
    for (const u of urls) {
      // allow legacy fallbacks without spamming red: skip obvious 404 roots
      const ok = await headOK(u);
      if (ok) return u;
    }
    return null;
  };

  const loadDecision = async () => {
    const u = await firstOK(decisionURLs);
    if (!u) {
      setText("decisionText", "—");
      setText("reasonText", "—");
      if (btnOpenDecision) btnOpenDecision.style.display = "none";
      return { ok:false, url:null, data:null };
    }
    try {
      const r = await fetch(u, { cache:"no-store" });
      const d = await r.json();
      const decision = d.decision ?? d.action ?? d.status ?? "—";
      const reason = d.reason ?? d.note ?? d.message ?? "—";
      setText("decisionText", decision);
      setText("reasonText", reason);
      if (btnOpenDecision) { btnOpenDecision.href = u; btnOpenDecision.style.display = ""; }
      return { ok:true, url:u, data:d };
    } catch (e) {
      setText("decisionText", "ERROR (safe): decision json parse failed");
      setText("reasonText", String(e));
      if (btnOpenDecision) btnOpenDecision.style.display = "none";
      return { ok:false, url:u, data:null };
    }
  };

  const loadOverlay = async () => {
    const key = pairSel ? pairSel.value : "auto";
    const urls = overlayCandidates[key] || overlayCandidates["auto"];
    const u = await firstOK(urls);
    if (!u) {
      if (img) img.style.display = "none";
      if (btnOpenImage) btnOpenImage.style.display = "none";
      if (imgMsg) imgMsg.textContent = "ERROR (safe): overlay image not found";
      return { ok:false, url:null };
    }

    // show
    if (imgMsg) imgMsg.textContent = "";
    if (img) {
      img.onerror = () => {
        img.style.display = "none";
        if (btnOpenImage) btnOpenImage.style.display = "none";
        if (imgMsg) imgMsg.textContent = "ERROR (safe): overlay image load failed";
      };
      img.onload = () => { img.style.display = ""; };
      img.src = u + (u.includes("?") ? "&" : "?") + "t=" + Date.now();
    }
    if (btnOpenImage) { btnOpenImage.href = u; btnOpenImage.style.display = ""; }
    return { ok:true, url:u };
  };

  const renderDebug = (decisionRes, overlayRes) => {
    const lines = [];
    lines.push("pair=" + (pairSel ? pairSel.value : "(null)"));
    lines.push("decision_url=" + (decisionRes?.url ?? "null"));
    lines.push("overlay_url=" + (overlayRes?.url ?? "null"));
    lines.push("");
    if (decisionRes?.data) lines.push(JSON.stringify(decisionRes.data, null, 2));
    setText("dbg", lines.join("\n"));
  };

  const refresh = async () => {
    const d = await loadDecision();
    const o = await loadOverlay();
    renderDebug(d, o);
  };

  if (pairSel) pairSel.addEventListener("change", refresh);
  refresh();
})();
</script>
</body>
</html>
