<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="color-scheme" content="dark"/>
  <title>LABOS / Overlay</title>

  <style>
    :root{
      --bg0:#070b14;
      --bg1:#0b1020;
      --panel:#0f172a;
      --border:rgba(255,255,255,.08);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --muted2:rgba(255,255,255,.45);
      --accent:#7c3aed;
      --accent2:#22c55e;
      --shadow:0 22px 70px rgba(0,0,0,.55);
      --r:22px;
    }
    body{
      margin:0;
      background:
        radial-gradient(1000px 700px at 25% 0%, rgba(124,58,237,.25), transparent 60%),
        radial-gradient(1000px 700px at 85% 10%, rgba(34,197,94,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    a{ color:inherit; text-decoration:none; }
    .wrap{ max-width:1180px; margin:0 auto; padding:18px 18px 60px; }

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:14px;
      padding:14px 16px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(15,23,42,.55);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    .brand{ display:flex; align-items:center; gap:12px; min-width:240px;}
    .logo{
      width:34px; height:34px; border-radius:12px;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #7c3aed 55%, #22c55e 120%);
      box-shadow: 0 10px 30px rgba(124,58,237,.25);
    }
    .brand .t1{ font-weight:800; letter-spacing:.2px; }
    .brand .t2{ font-size:12px; color:var(--muted); margin-top:2px; }

    .nav{
      display:flex; gap:10px;
      padding:6px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(10,16,32,.35);
    }
    .nav a{
      padding:10px 16px;
      border-radius:999px;
      color:var(--muted);
      transition: .15s ease;
      border:1px solid transparent;
    }
    .nav a:hover{ color:var(--text); background:rgba(255,255,255,.04); }
    .nav a.active{
      color:var(--text);
      background:rgba(124,58,237,.18);
      border-color: rgba(124,58,237,.35);
      box-shadow: inset 0 0 0 1px rgba(124,58,237,.18);
    }

    .asof{
      display:flex; align-items:center; gap:10px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(15,23,42,.55);
      min-width:320px;
      justify-content:flex-end;
      white-space:nowrap;
    }
    .dot{
      width:10px; height:10px; border-radius:999px;
      background:var(--accent2);
      box-shadow: 0 0 0 4px rgba(34,197,94,.15);
      flex:0 0 auto;
    }
    .asofText{ font-size:13px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; }

    h1{
      margin:26px 0 8px;
      font-size:46px;
      letter-spacing:.2px;
    }
    .sub{
      color:var(--muted);
      margin:0 0 18px;
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      font-size:12px;
      color:var(--muted);
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .card{
      border:1px solid var(--border);
      border-radius:var(--r);
      background:rgba(15,23,42,.45);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      overflow:hidden;
      margin-top:16px;
    }
    .card .hd{
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 18px;
      border-bottom:1px solid var(--border);
      gap:12px;
      flex-wrap:wrap;
    }
    .card .hd h2{
      margin:0;
      font-size:18px;
      letter-spacing:.2px;
    }
    .card .bd{ padding:16px 18px; color:var(--muted); }

    .tabs{
      display:flex; gap:10px; flex-wrap:wrap;
      padding:8px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(10,16,32,.35);
    }
    .tab{
      padding:10px 16px;
      border-radius:999px;
      color:var(--muted);
      border:1px solid transparent;
      cursor:pointer;
      user-select:none;
      transition:.15s ease;
    }
    .tab:hover{ color:var(--text); background:rgba(255,255,255,.04); }
    .tab.active{
      color:var(--text);
      background:rgba(124,58,237,.18);
      border-color: rgba(124,58,237,.35);
      box-shadow: inset 0 0 0 1px rgba(124,58,237,.18);
    }

    .imgWrap{
      margin-top:12px;
      border-radius:18px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      padding:14px;
    }
    .imgTop{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; flex-wrap:wrap;
      margin-bottom:10px;
    }
    .imgTitle{ font-weight:800; color:var(--text); }
    .imgPath{ color:var(--muted2); font-size:12px; }
    .imgBox{
      background:white;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.1);
    }
    .imgBox img{
      width:100%;
      height:auto;
      display:block;
      background:white;
    }

    @media (max-width: 980px){
      .asof{ min-width:unset; }
      .brand{ min-width:unset; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <div class="t1">LABOS</div>
          <div class="t2">World Politics / Overlay</div>
        </div>
      </div>

      <nav class="nav" aria-label="primary">
        <a href="/static/index.html">Index</a>
        <a class="active" href="/static/overlay.html">Overlay</a>
        <a href="/static/sentiment.html">Sentiment</a>
        <a href="/static/digest.html">Digest</a>
      </nav>

      <div class="asof" id="asofTop" title="as_of: from view_model_latest.json (fallback: daily_summary_latest.json)">
        <span class="dot"></span>
        <span class="asofText mono" id="asofTextTop">as_of: --</span>
      </div>
    </div>

    <h1>FX Overlay</h1>
    <p class="sub">
      <span class="mono" id="leadText">/analysis/view_model_latest.json から as_of を確定し、/analysis/fx の variants を表示。</span>
      <span class="pill mono" id="vmSourcePill">source: /analysis/view_model_latest.json</span>
    </p>

    <div class="card">
      <div class="hd">
        <h2>Overlay Images</h2>
        <div class="tabs" id="tabs"></div>
        <div class="pill mono" id="metaLine">as_of=-- / view=--</div>
      </div>
      <div class="bd">
        <div class="imgWrap">
          <div class="imgTop">
            <div class="imgTitle mono" id="panelTitle">--</div>
            <div class="imgPath mono" id="panelPath">--</div>
          </div>
          <div class="imgBox">
            <img id="panelImg" alt="fx overlay"/>
          </div>
        </div>
      </div>
    </div>

  </div>

<script>
(function(){
  "use strict";

  function q(id){ return document.getElementById(id); }
  function setText(id, txt){ const el=q(id); if(el) el.textContent = txt; }

  async function fetchJson(url){
    const r = await fetch(url, { cache:"no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status} ${url}`);
    return await r.json();
  }

  async function fetchFirstJson(urls){
    let lastErr = null;
    for (const u of urls){
      try{
        const j = await fetchJson(u);
        return { url: u, json: j };
      }catch(e){
        lastErr = e;
      }
    }
    throw (lastErr || new Error("fetchFirstJson: all failed"));
  }

  function extractAsOf(obj){
    if (!obj || typeof obj !== "object") return "";
    if (typeof obj.as_of === "string" && obj.as_of) return obj.as_of;
    if (obj.meta && typeof obj.meta === "object" && typeof obj.meta.as_of === "string" && obj.meta.as_of) return obj.meta.as_of;
    if (typeof obj.asOf === "string" && obj.asOf) return obj.asOf;
    if (typeof obj.date === "string" && obj.date) return obj.date;
    return "";
  }

  function extractAsOfAny(d){
    if (!d) return "";
    if (Array.isArray(d)) return extractAsOf(d[0] || {});
    if (typeof d === "object"){
      for (const k of ["items","articles","data","rows","results","events"]){
        if (Array.isArray(d[k]) && d[k].length) return extractAsOf(d[k][0] || d);
      }
    }
    return extractAsOf(d);
  }

  function getQuery(){
    const p = new URLSearchParams(location.search);
    return {
      view: (p.get("view") || "JPYTHB").toUpperCase(),
      v: p.get("v") || "",
    };
  }

  function updateMeta(asOf, view){
    setText("asofTextTop", `as_of ${asOf || "--"}`);
    setText("metaLine", `as_of=${asOf || "--"} / view=${view}`);
  }

  function buildTabs(views, activeView, onPick){
    const root = q("tabs");
    if (!root) return;
    root.innerHTML = "";
    for (const v of views){
      const el = document.createElement("div");
      el.className = "tab" + (v === activeView ? " active" : "");
      el.textContent = v;
      el.addEventListener("click", ()=> onPick(v));
      root.appendChild(el);
    }
  }

  function pickFxPath(view){
    // view_model の fx.variants があればそれを使うのが理想だが、
    // ここでは既存仕様の “latest png” を固定パスで表示（現状維持）。
    const key = view.toUpperCase();
    if (key === "USDJPY") return "/analysis/fx/fx_overlay_latest_usdjpy.png";
    if (key === "USDTHB") return "/analysis/fx/fx_overlay_latest_usdthb.png";
    if (key === "ALL") return "/analysis/fx/fx_overlay_latest_combined.png";
    return "/analysis/fx/fx_overlay_latest_jpythb.png";
  }

  async function main(){
    const qs = getQuery();
    let view = qs.view;

    const SOURCE_URLS = [
      "/analysis/view_model_latest.json",
      "/analysis/digest/view_model_latest.json",
      "/analysis/view/view_model_latest.json",
      "/analysis/world_politics/analysis/view_model_latest.json",
      "/static/analysis/view_model_latest.json",
      "/static/analysis/world_politics/analysis/view_model_latest.json",
    ];
    const SUMMARY_URLS = [
      "/analysis/daily_summary_latest.json",
      "/analysis/world_politics/analysis/daily_summary_latest.json",
      "/analysis/world_politics/static/daily_summary_latest.json",
      "/static/analysis/daily_summary_latest.json",
      "/static/analysis/world_politics/analysis/daily_summary_latest.json",
      "/static/world_politics/static/daily_summary_latest.json",
    ];

    // load view_model
    const vm = await fetchFirstJson(SOURCE_URLS);
    setText("vmSourcePill", "source: " + vm.url);

    let asOf = extractAsOf(vm.json) || "";

    // Prefer daily_summary_latest.json for "today-ness" when view_model is stale.
    try{
      const s = await fetchFirstJson(SUMMARY_URLS);
      const summaryAsOf = extractAsOfAny(s.json);
      if (summaryAsOf && summaryAsOf !== asOf){
        asOf = summaryAsOf;
        const el = document.getElementById("asofTop");
        if (el) el.title = `as_of source overridden by daily_summary_latest.json (${s.url})`;
      }
    }catch(_){
      // ignore
    }

    updateMeta(asOf, view);

    const views = ["JPY→THB","USD→JPY","USD→THB","ALL"];
    const viewKeyMap = {
      "JPY→THB":"JPYTHB",
      "USD→JPY":"USDJPY",
      "USD→THB":"USDTHB",
      "ALL":"ALL",
    };
    const revMap = Object.fromEntries(Object.entries(viewKeyMap).map(([k,v])=>[v,k]));

    const activeLabel = revMap[view] || "JPY→THB";
    buildTabs(views, activeLabel, (label)=>{
      const nextView = viewKeyMap[label] || "JPYTHB";
      const u = new URL(location.href);
      u.searchParams.set("view", nextView);
      location.href = u.toString();
    });

    const label = revMap[view] || activeLabel;
    setText("panelTitle", label.replace("→","↔"));
    const path = pickFxPath(view);
    setText("panelPath", path);

    const img = q("panelImg");
    if (img){
      const bust = (qs.v || String(Date.now()));
      img.src = path + (path.includes("?") ? "&" : "?") + "v=" + encodeURIComponent(bust);
    }
  }

  main().catch((e)=>{
    console.error(e);
    setText("asofTextTop", "as_of (error)");
  });

})();
</script>
</body>
</html>
