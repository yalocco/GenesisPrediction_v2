<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overlay - GenesisPrediction v2</title>
  <link rel="stylesheet" href="/static/app.css?v=20260303v2" />
  <script src="/static/_shared_nav.js?v=20260303v2"></script>
</head>
<body>
<main class="gp-main">
  <div class="page gp-page gp-page--sentiment">
    <section class="panel">
      <div class="h1">Overlay</div>
      <p class="sub">FX Overlay / Decision UI (safe mode).</p>

      <div class="grid2" style="margin-top:12px;">
        <div class="card">
          <div class="sectionTitle">
            <h2>Controls</h2>
            <span id="statePill" class="hint">loading…</span>
          </div>

          <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:10px;">
            <div style="min-width:240px;">
              <div class="hint" style="margin-bottom:6px;">Pair</div>
              <select id="pair" class="select" style="width:240px;">
                <option value="JPYTHB">JPYTHB</option>
                <option value="USDJPY">USDJPY</option>
                <option value="USDTHB">USDTHB</option>
                <option value="MULTI">MULTI</option>
              </select>
            </div>

            <div class="pillrow" style="margin-top:18px;">
              <a id="btnOpenDecision" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open decision JSON</a>
            </div>
          </div>

          <div style="margin-top:12px;">
            <div class="hint">Decision</div>
            <div id="decision" class="mono">—</div>
          </div>

          <div style="margin-top:10px;">
            <div class="hint">Reason</div>
            <div id="reason" class="mono small">—</div>
          </div>

          <div class="pillrow" style="margin-top:12px;">
            <span id="srcDecision" class="pill">source: --</span>
          </div>
        </div>

        <div class="card">
          <div class="sectionTitle">
            <h2>FX overlay</h2>
            <span class="hint">image preview</span>
          </div>

          <div class="pillrow" style="margin-top:10px;">
            <a id="btnOpenImage" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open image</a>
            <span id="srcImage" class="pill">source: --</span>
          </div>

          <div class="imgFrame" style="margin-top:10px;">
            <img id="img" alt="FX overlay" />
          </div>
        </div>
      </div>

    </section>
  </div>
</main>

<script>
(function(){
  "use strict";

  function safeText(x){ return (x==null) ? "" : String(x); }
  function setText(id, v){ var el=document.getElementById(id); if(el) el.textContent = safeText(v); }
  function setHref(id, v){ var el=document.getElementById(id); if(el) el.href = v || "#"; }
  function setImg(id, v){ var el=document.getElementById(id); if(el) el.src = v || ""; }

  async function fetchJson(url){
    const r = await fetch(url, {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  }

  const MAP = {
    JPYTHB: {
      img: "/data/fx/fx_overlay_latest_jpythb.png",
      decision: ["/data/fx/fx_decision_latest_jpythb.json", "/data/fx/fx_overlay_latest.json"]
    },
    USDJPY: {
      img: "/data/fx/fx_overlay_latest_usdjpy.png",
      decision: ["/data/fx/fx_decision_latest_usdjpy.json", "/data/fx/fx_overlay_latest.json"]
    },
    USDTHB: {
      img: "/data/fx/fx_overlay_latest_usdthb.png",
      decision: ["/data/fx/fx_decision_latest_usdthb.json", "/data/fx/fx_overlay_latest.json"]
    },
    MULTI: {
      img: "/data/fx/fx_overlay_multi_latest.png",
      decision: ["/data/fx/fx_decision_latest_multi.json", "/data/fx/fx_overlay_latest.json"]
    }
  };

  async function pickFirstOk(urls){
    for(const u of urls){
      try{
        const j = await fetchJson(u);
        return {url:u, json:j};
      }catch(_e){}
    }
    return null;
  }

  function extractDecision(obj){
    if(!obj) return {decision:"—", reason:"—"};
    // いろんな形式に耐える
    const d = obj.decision || obj.action || obj.status || obj.recommendation || "—";
    const r = obj.reason || obj.rationale || obj.message || obj.note || "";
    return {decision: safeText(d), reason: safeText(r) || "—"};
  }

  async function loadPair(pair){
    const conf = MAP[pair] || MAP.JPYTHB;

    // image
    const imgUrl = conf.img + "?t=" + Date.now();
    setImg("img", imgUrl);
    setHref("btnOpenImage", imgUrl);
    setText("srcImage", "source: " + conf.img);

    // decision
    const picked = await pickFirstOk(conf.decision);
    if(picked){
      const ex = extractDecision(picked.json);
      setText("decision", ex.decision);
      setText("reason", ex.reason);
      setHref("btnOpenDecision", picked.url);
      setText("srcDecision", "source: " + picked.url);
      setText("statePill", "OK");
    }else{
      setText("decision", "—");
      setText("reason", "—");
      setHref("btnOpenDecision", "#");
      setText("srcDecision", "source: missing");
      setText("statePill", "missing");
    }
  }

  const sel = document.getElementById("pair");
  if(sel){
    sel.addEventListener("change", function(){
      loadPair(sel.value);
    });
  }

  loadPair("JPYTHB");

})();
</script>
</body>
</html>
