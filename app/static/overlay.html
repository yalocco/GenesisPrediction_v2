<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FX Overlay - GenesisPrediction v2</title>
<style>
  :root{color-scheme:dark;}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    background: radial-gradient(1200px 800px at 15% 20%, rgba(120,80,255,.25), transparent 60%),
                radial-gradient(1200px 800px at 80% 30%, rgba(0,180,160,.20), transparent 60%),
                linear-gradient(180deg, #061022 0%, #040813 60%, #02040b 100%);
    color: rgba(245,248,255,.92);
  }
  .topbar{
    position: sticky; top:0; z-index:20;
    backdrop-filter: blur(10px);
    background: rgba(3,8,18,.72);
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .topbarInner{
    max-width: 1200px; margin:0 auto; padding: 10px 16px;
    display:flex; align-items:center; gap:12px; justify-content:space-between;
  }
  .brand{display:flex; align-items:center; gap:10px; min-width: 220px;}
  .dot{width:10px; height:10px; border-radius:999px; background: rgba(105,169,255,.9); box-shadow: 0 0 0 4px rgba(105,169,255,.18);}
  .brandName{font-weight:650; letter-spacing:.2px; opacity:.95; font-size:14px;}
  nav{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;}
  .navLink{
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.04);
    color: rgba(245,248,255,.92);
    text-decoration:none;
    font-size: 12px;
    line-height: 1;
  }
  .navLink:hover{border-color: rgba(105,169,255,.55)}
  .navLink.active{border-color: rgba(105,169,255,.75); box-shadow: 0 0 0 3px rgba(105,169,255,.12) inset;}
  .pill{
    display:inline-flex; align-items:center; gap:8px;
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.03);
    font-size:12px;
    color: rgba(245,248,255,.86);
    white-space:nowrap;
  }
  .pillDot{width:8px; height:8px; border-radius:999px; background: rgba(75,220,160,.95); box-shadow:0 0 0 4px rgba(75,220,160,.14);}
  .pillDot.err{background: rgba(255,96,96,.95); box-shadow:0 0 0 4px rgba(255,96,96,.14);}

  .wrap{max-width:1200px; margin:0 auto; padding: 22px 16px 40px;}
  h1{margin: 12px 0 6px; font-size: 52px; letter-spacing:.2px;}
  .sub{opacity:.8; font-size: 13px;}
  .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}

  .card{
    margin-top: 18px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,.08);
    background: linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
    overflow:hidden;
  }
  .cardHd{
    padding: 14px 14px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .cardTitle{font-weight:650; letter-spacing:.2px; opacity:.92;}
  .tabs{display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center;}
  .tab{
    cursor:pointer;
    padding: 9px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.03);
    font-size: 12px;
    color: rgba(245,248,255,.88);
    user-select:none;
  }
  .tab:hover{border-color: rgba(105,169,255,.55)}
  .tab.active{border-color: rgba(155,110,255,.78); background: rgba(155,110,255,.14); box-shadow: 0 0 0 3px rgba(155,110,255,.10) inset;}

  .imgWrap{padding: 14px;}
  .imgTop{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom: 10px;}
  .imgTitle{font-weight:650; opacity:.92;}
  .imgPath{opacity:.65; font-size: 12px;}
  .imgBox{
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(0,0,0,.18);
    padding: 10px;
    display:flex; align-items:center; justify-content:center;
    min-height: 240px;
  }
  img{max-width:100%; height:auto; border-radius: 12px; background:#fff;}

  .msg{
    width:100%;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(255,255,255,.03);
    padding: 12px 12px;
    color: rgba(245,248,255,.86);
    font-size: 12px;
  }
  .msg strong{font-weight:650;}

  @media (max-width: 820px){
    h1{font-size: 40px;}
    .brand{min-width: unset;}
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbarInner">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <span class="brandName">GenesisPrediction v2</span>
      </div>
      <nav>
        <a class="navLink" href="/static/index.html">Home</a>
        <a class="navLink active" href="/static/overlay.html">Overlay</a>
        <a class="navLink" href="/static/sentiment.html">Sentiment</a>
        <span class="pill" id="statusPill"><span class="pillDot" id="statusDot"></span><span id="statusText">Loading...</span></span>
        <span class="pill"><span class="pillDot" id="asofDot"></span><span class="mono" id="asofText">as_of: --</span></span>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <h1>FX Overlay</h1>
    <div class="sub mono">/analysis/view_model_latest.json から as_of を確定し、/analysis/fx の variants を表示。</div>

    <div class="card">
      <div class="cardHd">
        <div class="cardTitle">Overlay Images</div>
        <div class="tabs" id="tabs"></div>
        <div class="pill mono" id="metaLine">as_of=-- / view=--</div>
      </div>
      <div class="imgWrap">
        <div class="imgTop">
          <div class="imgTitle mono" id="panelTitle">--</div>
          <div class="imgPath mono" id="panelPath">--</div>
        </div>
        <div class="imgBox" id="imgBox">
          <img id="panelImg" alt="fx overlay" />
        </div>
      </div>
    </div>
  </main>

<script>
(function(){
  "use strict";

  function q(id){ return document.getElementById(id); }
  function setText(id, txt){ const el=q(id); if(el) el.textContent = txt; }
  function setStatus(ok, text){
    const dot = q("statusDot");
    const pill = q("statusPill");
    if(dot) dot.classList.toggle("err", !ok);
    if(pill) pill.title = ok ? "" : (text || "error");
    setText("statusText", text || (ok ? "Ready" : "Error"));
  }

  async function headOk(url){
    try{
      const r = await fetch(url, { method: "HEAD", cache: "no-store" });
      return r.ok;
    }catch(_){
      return false;
    }
  }

  async function fetchJson(url){
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status} ${url}`);
    return await r.json();
  }

  async function fetchFirstJson(urls){
    let lastErr = null;
    for (const u of urls){
      try{
        const j = await fetchJson(u);
        return { url: u, json: j };
      }catch(e){
        lastErr = e;
      }
    }
    throw (lastErr || new Error("fetchFirstJson: all failed"));
  }

  function extractAsOf(obj){
    if (!obj || typeof obj !== "object") return "";
    if (typeof obj.as_of === "string" && obj.as_of) return obj.as_of;
    if (obj.meta && typeof obj.meta === "object" && typeof obj.meta.as_of === "string" && obj.meta.as_of) return obj.meta.as_of;
    if (typeof obj.asOf === "string" && obj.asOf) return obj.asOf;
    if (typeof obj.date === "string" && obj.date) return obj.date;
    return "";
  }

  function extractAsOfAny(d){
    if (!d) return "";
    if (Array.isArray(d)) return extractAsOf(d[0] || {});
    if (typeof d === "object"){
      for (const k of ["items","articles","data","rows","results","events"]){
        if (Array.isArray(d[k]) && d[k].length) return extractAsOf(d[k][0] || d);
      }
    }
    return extractAsOf(d);
  }

  function getQuery(){
    const p = new URLSearchParams(location.search);
    return {
      view: (p.get("view") || "JPYTHB").toUpperCase(),
      v: p.get("v") || "",
    };
  }

  function updateMeta(asOf, view){
    setText("asofText", `as_of: ${asOf || "--"}`);
    setText("metaLine", `as_of=${asOf || "--"} / view=${view}`);
  }

  function buildTabs(labels, active, onPick){
    const root = q("tabs");
    if (!root) return;
    root.innerHTML = "";
    for (const lab of labels){
      const el = document.createElement("div");
      el.className = "tab" + (lab === active ? " active" : "");
      el.textContent = lab;
      el.addEventListener("click", ()=> onPick(lab));
      root.appendChild(el);
    }
  }

  async function resolveFxBase(){
    // Prefer direct /analysis (FastAPI often mounts analysis as data root)
    // Fallback to /static/analysis (some deployments mirror under static)
    const probes = [
      "/analysis/fx/fx_overlay_latest_jpythb.png",
      "/analysis/fx_overlay_latest_jpythb.png",
      "/static/analysis/fx/fx_overlay_latest_jpythb.png",
      "/static/analysis/fx_overlay_latest_jpythb.png",
    ];
    for (const p of probes){
      if (await headOk(p)){
        // return directory portion
        return p.replace(/\/fx_overlay_latest_jpythb\.png$/, "");
      }
    }
    // no probe hit -> default to /analysis/fx (most common in this project)
    return "/analysis/fx";
  }

  function fxPath(base, view){
    const key = view.toUpperCase();
    if (key === "USDJPY") return `${base}/fx_overlay_latest_usdjpy.png`;
    if (key === "USDTHB") return `${base}/fx_overlay_latest_usdthb.png`;
    return `${base}/fx_overlay_latest_jpythb.png`;
  }

  function showNotFound(tried){
    const box = q("imgBox");
    if(!box) return;
    box.innerHTML = `<div class="msg"><strong>Overlay image not found.</strong><br/>Tried:<br/><span class="mono">${tried.replace(/</g,"&lt;")}</span></div>`;
  }

  async function main(){
    setStatus(true, "Loading...");

    const qs = getQuery();
    const view = qs.view;

    // 1) view_model (as_of)
    const SOURCE_URLS = [
      "/analysis/view_model_latest.json",
      "/analysis/digest/view_model_latest.json",
      "/analysis/view/view_model_latest.json",
      "/analysis/world_politics/analysis/view_model_latest.json",
      "/static/analysis/view_model_latest.json",
      "/static/analysis/world_politics/analysis/view_model_latest.json",
    ];
    const SUMMARY_URLS = [
      "/analysis/daily_summary_latest.json",
      "/analysis/world_politics/analysis/daily_summary_latest.json",
      "/analysis/world_politics/static/daily_summary_latest.json",
      "/static/analysis/daily_summary_latest.json",
      "/static/analysis/world_politics/analysis/daily_summary_latest.json",
      "/static/world_politics/static/daily_summary_latest.json",
    ];

    let asOf = "";
    try{
      const vm = await fetchFirstJson(SOURCE_URLS);
      asOf = extractAsOf(vm.json) || "";

      // Prefer daily_summary for today-ness
      try{
        const s = await fetchFirstJson(SUMMARY_URLS);
        const sAs = extractAsOfAny(s.json);
        if (sAs) asOf = sAs;
      }catch(_){ /* ignore */ }
    }catch(e){
      // as_of could fail in static-only environments; still try to render image.
      console.warn(e);
    }

    updateMeta(asOf, view);

    // 2) tabs
    const labels = ["JPYTHB","USDJPY","USDTHB"];
    const active = labels.includes(view) ? view : "JPYTHB";
    buildTabs(labels, active, (lab)=>{
      const u = new URL(location.href);
      u.searchParams.set("view", lab);
      location.href = u.toString();
    });

    setText("panelTitle", active);

    // 3) resolve base path dynamically
    const base = await resolveFxBase();
    const path = fxPath(base, active);
    setText("panelPath", path);

    // 4) render image (fallback if missing)
    const img = document.createElement("img");
    img.alt = "fx overlay";
    img.onload = ()=>{ setStatus(true, "Ready"); };
    img.onerror = async ()=>{
      // try a couple alternative bases if first path 404s
      const alts = [
        path,
        fxPath("/analysis/fx", active),
        fxPath("/analysis", active),
        fxPath("/static/analysis/fx", active),
        fxPath("/static/analysis", active),
      ];
      for (const p of alts){
        if (await headOk(p)){
          const bust = (qs.v || String(Date.now()));
          img.src = p + (p.includes("?") ? "&" : "?") + "v=" + encodeURIComponent(bust);
          setText("panelPath", p);
          setStatus(true, "Ready");
          return;
        }
      }
      setStatus(false, "No image");
      showNotFound(alts.join("\n"));
    };

    const bust = (qs.v || String(Date.now()));
    img.src = path + (path.includes("?") ? "&" : "?") + "v=" + encodeURIComponent(bust);

    const box = q("imgBox");
    if (box){
      box.innerHTML = "";
      box.appendChild(img);
    }
  }

  main().catch((e)=>{
    console.error(e);
    setStatus(false, "Error");
    setText("asofText", "as_of: (error)");
  });
})();
</script>
</body>
</html>
